# TEST-specific Zot registry config.
#
# Phase A: registry is NOT included in argocd/test/apps/applicationset.yaml,
# so this chart is never deployed in TEST — workloads here pull from
# zot.dev.<DOMAIN_SUFFIX> over the public internet using the same
# pull-dockerconfigjson seeded into TEST's Vault. The file exists for
# symmetry; if you later flip Zot on in TEST (multi-registry topology),
# point the Vault path here.
externalsecret-htpasswd:
  externalSecret:
    vaultPath: test/app/registry
