# Traefik Middleware: removes the `WWW-Authenticate: Basic realm="zot"`
# response header. Used ONLY on the browser route in ingressroute.yaml
# (User-Agent matches `^Mozilla` → strips) — the CLI route does NOT
# attach this middleware so containerd / docker / buildah still receive
# the challenge and can auto-discover the auth scheme to retry with
# credentials.
#
# Setting `customResponseHeaders.<Name>: ""` instructs Traefik to drop
# that header from the response entirely (not set it to an empty value).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: zot-strip-basic-challenge
  namespace: registry
spec:
  headers:
    customResponseHeaders:
      WWW-Authenticate: ""
