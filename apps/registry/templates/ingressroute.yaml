# Traefik IngressRoute with TWO routes for the same host — splits
# behavior between browser and CLI clients based on User-Agent.
#
# Routing decision: the FIRST rule that matches wins (highest priority
# first). Both rules target the same Service; only middleware chains
# differ.
#
# 1. Browser path (priority 100) — User-Agent starts with `Mozilla`
#    (all modern browsers: Chrome, Firefox, Safari, Edge use
#    `Mozilla/5.0 (...)`). Applied middlewares:
#       - oidc-redirect       (bare-host → /zot/auth/login?provider=oidc)
#       - strip-basic-challenge (removes WWW-Authenticate from response
#         so the browser never pops its native Basic-auth dialog)
#
# 2. CLI path (priority 50) — everything else (containerd, docker,
#    buildah, skopeo, curl). No strip middleware so the WWW-Authenticate
#    Basic challenge is delivered to the client, allowing
#    auto-discovery + retry with credentials from local docker-config.
#
# `Path(/)` is intentionally NOT required on the browser rule — once
# inside the UI all subsequent navigations (XHR to /v2/_zot/ext/search,
# asset loads, /home routing) hit Zot directly via cookie auth and
# would 401 with WWW-Authenticate stripped (no popup) which the React
# app handles gracefully.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: registry-{{ .Values.global.env }}
  namespace: registry
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`zot.{{ .Values.global.env }}.{{ .Values.global.domain }}`) && HeaderRegexp(`User-Agent`, `^Mozilla`)
      kind: Rule
      priority: 100
      middlewares:
        - name: registry-{{ .Values.global.env }}-oidc-redirect
          namespace: registry
        - name: zot-strip-basic-challenge
          namespace: registry
      services:
        - name: registry-{{ .Values.global.env }}-app
          port: 5000
    - match: Host(`zot.{{ .Values.global.env }}.{{ .Values.global.domain }}`)
      kind: Rule
      priority: 50
      services:
        - name: registry-{{ .Values.global.env }}-app
          port: 5000
  tls:
    secretName: registry-{{ .Values.global.env }}-tls
