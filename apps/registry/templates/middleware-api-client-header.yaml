# Suppress the browser's native Basic-auth popup that fires whenever
# the Zot UI XHR catches a 401 from /v2/*. Zot tags every 401 with
# `WWW-Authenticate: Basic realm="zot"` UNLESS the request already
# carries `X-ZOT-API-CLIENT: zot-ui` (the Zot UI's own JS sets that
# header on its requests; browser-triggered fetches don't).
#
# Earlier we added the header at the Traefik edge for ALL requests,
# but that broke CLI auth: `ctr push` / `buildah login` send their
# HEAD probe expecting a WWW-Authenticate challenge to discover the
# auth scheme, and without the header containerd hits 401 and aborts
# rather than retrying with credentials.
#
# This new middleware strips the WWW-Authenticate header from
# RESPONSES instead — the browser doesn't see the Basic challenge so
# no popup, but the 401 itself is still emitted and a CLI client with
# credentials in its docker-config can still authenticate (it does
# `Authorization: Basic <creds>` on every request when the registry
# is in its `auths:` block).
#
# Pure response-header rewrite — doesn't touch the request, doesn't
# affect Zot's authn logic.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: zot-strip-basic-challenge
  namespace: registry
spec:
  headers:
    # Setting a custom response header to empty string causes Traefik
    # to drop the header from the response entirely.
    customResponseHeaders:
      WWW-Authenticate: ""
