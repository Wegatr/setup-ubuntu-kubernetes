# Defaults: every dep is `enabled: false` so values-<env>.yaml can flip
# each on per-env. Phase A: DEV only.

secret-store:
  enabled: false   # values-<env>.yaml overrides
  name: vault-backend

# ExternalSecret materializes K8s Secret `login-auth` with two keys:
#   - htpasswd       full htpasswd line, e.g. `admin:$2y$05$...`
#                    generate with: htpasswd -nbB admin '<password>'
#   - cookie-secret  32-byte string used for AES-256 cookie encryption
#                    generate with: openssl rand -base64 32 | head -c 32
externalsecret-auth:
  externalSecret:
    enabled: false   # values-<env>.yaml overrides
    name: login-auth
    namespace: login
    targetSecretName: login-auth
    data:
      - secretKey: htpasswd
        property: htpasswd
      - secretKey: cookie-secret
        property: cookie-secret

# oauth2-proxy: configured for forwardAuth-server mode.
# Upstream is `static://200` because this oauth2-proxy doesn't reverse-proxy
# any backend — it only serves the /oauth2/* endpoints + replies to Traefik
# forwardAuth checks. Cookie scope is the env apex so login at login.dev
# carries to tekton.dev, dbgate.dev, etc.
oauth-proxy:
  oauth2proxy:
    enabled: false   # values-<env>.yaml overrides
    upstream: "static://200"
    # The proxy itself is reachable at login.<env>.<domain>.
    hostname: 'login.{{ .Values.global.env }}.{{ .Values.global.domain }}'
    # Apex-scoped cookie + whitelist so sessions and redirects work across
    # every subdomain in this env. Leading dot is mandatory.
    cookieDomain: '.{{ .Values.global.env }}.{{ .Values.global.domain }}'
    whitelistDomain: '.{{ .Values.global.env }}.{{ .Values.global.domain }}'
    authSecretName: login-auth
    cookieName: _platform_session
    cookieExpire: 168h
    cookieRefresh: 24h

# Traefik forwardAuth Middleware. Consumer Ingresses point at it via
# `login-forwardauth@kubernetescrd`. The address is cluster-internal so
# Traefik routes the auth-check entirely in-cluster (no public hop).
forwardauth:
  fullnameOverride: forwardauth
  middleware:
    enabled: false   # values-<env>.yaml overrides
    type: forwardAuth
    forwardAuth:
      address: 'http://{{ .Release.Name }}-oauth-proxy.{{ .Release.Namespace }}.svc.cluster.local:4180/'
      trustForwardHeader: true
      authResponseHeaders:
        - X-Auth-Request-User
        - X-Auth-Request-Email
        - X-Auth-Request-Preferred-Username
        - X-Auth-Request-Access-Token
        - Authorization

ingress:
  ingress:
    enabled: false   # values-<env>.yaml overrides
    className: public
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    host: 'login.{{ .Values.global.env }}.{{ .Values.global.domain }}'
    paths:
      - path: /
        pathType: Prefix
        # Service emitted by the oauth-proxy lib chart, named
        # `{{ .Release.Name }}-oauth-proxy`.
        serviceName: '{{ .Release.Name }}-oauth-proxy'
        servicePort: 4180
    tls:
      enabled: true
      secretName: login-tls
