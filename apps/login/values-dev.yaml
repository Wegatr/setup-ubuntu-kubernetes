# DEV overrides: flip every dep on. Phase A is DEV-only; TEST/PROD don't
# need shared auth yet (no human-facing UIs there beyond observability,
# which is reached via VPN).

secret-store:
  enabled: true

externalsecret-auth:
  externalSecret:
    enabled: true
    vaultPath: dev/app/login

oauth-proxy:
  oauth2proxy:
    enabled: true

forwardauth:
  middleware:
    enabled: true

ingress:
  ingress:
    enabled: true

ingressRoute:
  enabled: true

# Hostnames whose /oauth2/* path prefix routes back to this oauth2-proxy.
# Must include every subdomain that carries the login-forwardauth@kubernetescrd
# annotation on its main Ingress.
oauth2PathsHosts:
  - 'argo.{{ .Values.global.env }}.{{ .Values.global.domain }}'
  - 'kube.{{ .Values.global.env }}.{{ .Values.global.domain }}'
  - 'vault.{{ .Values.global.env }}.{{ .Values.global.domain }}'
  - 'tekton.{{ .Values.global.env }}.{{ .Values.global.domain }}'
  - 'gate.{{ .Values.global.env }}.{{ .Values.global.domain }}'
  - 'grafana.{{ .Values.global.env }}.{{ .Values.global.domain }}'
  - 'log.{{ .Values.global.env }}.{{ .Values.global.domain }}'
