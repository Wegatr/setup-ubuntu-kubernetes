# DEV-specific Tekton overrides. Phase A: only DEV runs the image-build
# pipelines + the Dashboard UI.
dashboard:
  enabled: true

secret-store:
  enabled: true

externalsecret-auth:
  externalSecret:
    enabled: true
    vaultPath: dev/app/tekton-dashboard

basicauth:
  middleware:
    enabled: true

ingress:
  ingress:
    enabled: true
