# Tekton operator install — NOT version-pinned at the Helm-chart level because
# Tekton releases are best consumed as raw YAML manifests from the
# tektoncd/{pipeline,triggers} GitHub releases. See README.md for the curl-
# refresh procedure.
#
# The chart itself emits the ServiceMonitor + alert rules; the actual operator
# manifests are vendored in templates/release-*.yaml (refresh by re-downloading).
release:
  pipelinesVersion: "v1.12.0"     # ghcr.io anon-pull (gcr.io retired pre-v0.65)
  triggersVersion: "v0.35.0"      # informational
  interceptorsVersion: "v0.35.0"  # informational
  dashboardVersion: "v0.68.0"     # informational (only deployed when dashboard.enabled)

# ----- Tekton Dashboard (DEV-only) -----------------------------------------
# Gated by .Values.dashboard.enabled. Defaults to false here; values-dev.yaml
# flips to true. TEST/PROD leave the default → dashboard resources don't
# render, the Ingress dep also produces nothing because its own enabled
# flag is off below.
#
# Auth is delegated to the platform IdP (Authentik, installed by
# setup-kubernetes — see setup-kubernetes/manifests/idp/). Traefik
# forwardAuth Middleware annotation below points at
# idp-forwardauth@kubernetescrd. No per-app auth bits in this chart.
# Cookie set at idp.<env>.<domain> carries here via the apex-scoped session.
dashboard:
  enabled: false   # values-dev.yaml overrides to true

ingress:
  ingress:
    enabled: false  # values-dev.yaml overrides
    className: public
    annotations:
      # Cross-namespace Middleware ref: <namespace>-<middleware-name>@kubernetescrd
      # The Middleware lives in the `idp` namespace and is created by
      # setup-kubernetes/lib/deploy-idp.sh. Order matters — Traefik evaluates
      # auth BEFORE routing.
      traefik.ingress.kubernetes.io/router.middlewares: idp-forwardauth@kubernetescrd
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    host: 'tekton.{{ .Values.global.env }}.{{ .Values.global.domain }}'
    paths:
      - path: /
        pathType: Prefix
        # Direct backend — Traefik proxies to the upstream Dashboard once
        # forwardAuth has signed off. Service emitted by the vendored
        # release-dashboard.yaml (name `tekton-dashboard`, port 9097).
        serviceName: tekton-dashboard
        servicePort: 9097
    tls:
      enabled: true
      secretName: tekton-dashboard-tls

# Default-deny feature flags / config-defaults for Tekton Pipelines.
# - disable affinity assistant: not needed on single-node MicroK8s where every
#   PipelineRun's pods land on the same node anyway, and it adds overhead.
# - default ServiceAccount: use the app's pipeline-sa from image-builder.
#
# These settings are applied via a ConfigMap patch (see templates/config-patches.yaml)
# rather than baked into the upstream manifests so we can refresh those without
# losing the config.
config:
  disableAffinityAssistant: true
  defaultServiceAccount: pipeline-sa

# Monitoring — scrape the Tekton controllers' metrics endpoints and alert on
# Pipeline failures + long-running PipelineRuns.
monitoring:
  serviceMonitors:
    tekton:
      enabled: true
      namespaces: [tekton]
      matchLabels:
        app.kubernetes.io/part-of: tekton
      endpoints:
        - port: http-metrics
          interval: 60s
    tekton-triggers:
      enabled: true
      namespaces: [tekton]
      matchLabels:
        app.kubernetes.io/part-of: tekton-triggers
      endpoints:
        - port: http-metrics
          interval: 60s

  prometheusRules:
    tekton:
      enabled: true
      groups:
        - name: tekton
          interval: 60s
          rules:
            - alert: TektonControllerDown
              expr: up{job=~"tekton.*|tekton-triggers.*"} == 0
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Tekton controller {{ $labels.job }} is down"

            - alert: PipelineRunFailed
              expr: increase(tekton_pipelines_controller_pipelinerun_count{status="failed"}[10m]) > 0
              for: 1m
              labels:
                severity: warning
              annotations:
                summary: "Tekton PipelineRun failed in last 10 min"
                description: "Check `tkn pipelinerun list` in the image-builder namespace."

            - alert: PipelineRunRunningTooLong
              expr: time() - max(tekton_pipelines_controller_running_pipelineruns_count > 0) > 1800
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Tekton PipelineRun has been running > 30 minutes"
