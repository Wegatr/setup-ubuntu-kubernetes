# Tekton operator install — NOT version-pinned at the Helm-chart level because
# Tekton releases are best consumed as raw YAML manifests from the
# tektoncd/{pipeline,triggers} GitHub releases. See README.md for the curl-
# refresh procedure.
#
# The chart itself emits the ServiceMonitor + alert rules; the actual operator
# manifests are vendored in templates/release-*.yaml (refresh by re-downloading).
release:
  pipelinesVersion: "v1.12.0"     # ghcr.io anon-pull (gcr.io retired pre-v0.65)
  triggersVersion: "v0.35.0"      # informational
  interceptorsVersion: "v0.35.0"  # informational
  dashboardVersion: "v0.68.0"     # informational (only deployed when dashboard.enabled)

# ----- Tekton Dashboard (DEV-only) -----------------------------------------
# Gated by .Values.dashboard.enabled. Defaults to false here; values-dev.yaml
# flips to true. TEST/PROD leave the default → dashboard resources don't
# render, lib-chart deps (ingress/oauth-proxy/secret-store/external-secret)
# also produce nothing because their own enabled flags are off below.
#
# Dashboard lives at https://tekton.<env>.<DOMAIN_SUFFIX>/ behind an
# oauth2-proxy reverse-proxy. Auth = htpasswd (single admin) + signed
# session cookie (7d expiry, 24h refresh). Both secrets come from Vault
# path secret/<env>/app/tekton, keys `htpasswd` and `cookie-secret`.
dashboard:
  enabled: false   # values-dev.yaml overrides to true

secret-store:
  enabled: false   # values-dev.yaml overrides
  name: vault-backend

# ExternalSecret materializes a K8s Secret with TWO keys:
#   - htpasswd        full htpasswd line, e.g. `admin:$2y$05$...`
#                     generate with: htpasswd -nbB admin '<plaintext>'
#   - cookie-secret   32-byte string used for AES-256 cookie encryption
#                     generate with: openssl rand -base64 32 | head -c 32
# Both keys must exist at Vault path secret/<env>/app/tekton — operator
# creates them via Vault UI (DEV bootstrap, see README.md).
externalsecret-auth:
  externalSecret:
    enabled: false  # values-dev.yaml overrides
    name: tekton-dashboard-auth
    namespace: tekton
    targetSecretName: tekton-dashboard-auth
    data:
      - secretKey: htpasswd
        property: htpasswd
      - secretKey: cookie-secret
        property: cookie-secret

# oauth2-proxy v7 reverse-proxy in front of the Tekton Dashboard Service.
# Cookie name is namespace-scoped so a future oauth2-proxy instance for
# another app (e.g. ArgoCD) doesn't collide on the same parent domain.
oauth-proxy:
  oauth2proxy:
    enabled: false   # values-dev.yaml overrides
    # Proxies to the Tekton Dashboard Service emitted by the vendored
    # release-dashboard.yaml (service name `tekton-dashboard`, port 9097).
    upstream: 'http://tekton-dashboard.{{ .Release.Namespace }}.svc.cluster.local:9097'
    hostname: 'tekton.{{ .Values.global.env }}.{{ .Values.global.domain }}'
    authSecretName: tekton-dashboard-auth
    cookieName: _tekton_session
    cookieExpire: 168h
    cookieRefresh: 24h

ingress:
  ingress:
    enabled: false  # values-dev.yaml overrides
    className: public
    annotations:
      # No middleware annotation any more — oauth2-proxy IS the gate; Traefik
      # forwards directly to it.
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    host: 'tekton.{{ .Values.global.env }}.{{ .Values.global.domain }}'
    paths:
      - path: /
        pathType: Prefix
        # Service emitted by the oauth-proxy lib chart. Naming convention is
        # `{{ Release.Name }}-{{ chart-or-alias }}` → `tekton-oauth-proxy`
        # in this release.
        serviceName: tekton-oauth-proxy
        servicePort: 4180
    tls:
      enabled: true
      secretName: tekton-dashboard-tls

# Default-deny feature flags / config-defaults for Tekton Pipelines.
# - disable affinity assistant: not needed on single-node MicroK8s where every
#   PipelineRun's pods land on the same node anyway, and it adds overhead.
# - default ServiceAccount: use the app's pipeline-sa from image-builder.
#
# These settings are applied via a ConfigMap patch (see templates/config-patches.yaml)
# rather than baked into the upstream manifests so we can refresh those without
# losing the config.
config:
  disableAffinityAssistant: true
  defaultServiceAccount: pipeline-sa

# Monitoring — scrape the Tekton controllers' metrics endpoints and alert on
# Pipeline failures + long-running PipelineRuns.
monitoring:
  serviceMonitors:
    tekton:
      enabled: true
      namespaces: [tekton]
      matchLabels:
        app.kubernetes.io/part-of: tekton
      endpoints:
        - port: http-metrics
          interval: 60s
    tekton-triggers:
      enabled: true
      namespaces: [tekton]
      matchLabels:
        app.kubernetes.io/part-of: tekton-triggers
      endpoints:
        - port: http-metrics
          interval: 60s

  prometheusRules:
    tekton:
      enabled: true
      groups:
        - name: tekton
          interval: 60s
          rules:
            - alert: TektonControllerDown
              expr: up{job=~"tekton.*|tekton-triggers.*"} == 0
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Tekton controller {{ $labels.job }} is down"

            - alert: PipelineRunFailed
              expr: increase(tekton_pipelines_controller_pipelinerun_count{status="failed"}[10m]) > 0
              for: 1m
              labels:
                severity: warning
              annotations:
                summary: "Tekton PipelineRun failed in last 10 min"
                description: "Check `tkn pipelinerun list` in the image-builder namespace."

            - alert: PipelineRunRunningTooLong
              expr: time() - max(tekton_pipelines_controller_running_pipelineruns_count > 0) > 1800
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Tekton PipelineRun has been running > 30 minutes"
