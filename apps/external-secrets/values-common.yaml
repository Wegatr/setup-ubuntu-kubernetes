# Per-namespace ESO controller. `scopedNamespace` is injected per-instance
# by argocd/<env>/apps/applicationset-eso.yaml via helm.valuesObject — each
# generated Application gets its own NS pinned here.
external-secrets:
  # CRDs come from apps/external-secrets-crds/ (cluster-wide, sync wave 0).
  installCRDs: false

  # The actual controller Deployment + ServiceAccount + RBAC. We want this.
  createOperator: true

  # SCOPING — the whole reason this chart exists ----------------------------
  # When scopedNamespace is set AND scopedRBAC=true, the chart renders:
  #   - Role (not ClusterRole) for secrets/configmaps/events in this NS
  #   - RoleBinding (not ClusterRoleBinding) to the operator's SA
  #   - controller binary started with --namespace=<scopedNamespace>
  # → the pod cannot read or write Secrets in any other namespace, even if
  #   its SA were exfiltrated.
  scopedNamespace: ""          # set per-app via valuesObject in the AppSet
  scopedRBAC: true

  # When scopedRBAC=true, the controller MUST NOT try to watch any of the
  # Cluster-* CRs — those require ClusterRole privileges we don't grant.
  # Leaving these on would produce "forbidden" reconcile errors on every
  # tick. We don't use Cluster* anywhere in this platform anyway.
  processClusterExternalSecret: false
  processClusterPushSecret: false
  processClusterStore: false
  processClusterGenerator: false

  # By default the chart also renders a (bindingless, harmless) ClusterRole
  # labelled `servicebinding.io/controller: true` so an *external* service-
  # binding controller could aggregate it. Disable for strict "no cluster-
  # wide resources from this chart" compliance.
  rbac:
    servicebindings:
      create: false

  # No webhook → no cluster-wide ValidatingWebhookConfiguration, no webhook
  # pod, no cert-controller. CR validation moves from admission-time to
  # reconcile-time (errors surface on the ExternalSecret's .status instead
  # of at apply time). This is exactly what the "no cluster-wide controller"
  # constraint requires.
  webhook:
    create: false
  certController:
    create: false

  # Single replica — we run one controller per app namespace, no leader
  # election needed.
  replicaCount: 1
  leaderElect: false

  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # Expose /metrics so apps/observability/'s cluster-wide
  # external-secrets ServiceMonitor (matchLabels app.kubernetes.io/name=
  # external-secrets, no namespace filter) discovers every per-NS instance.
  metrics:
    service:
      enabled: true

  # Don't render a per-release ServiceMonitor — the central one in
  # apps/observability/values-common.yaml already scrapes anything labelled
  # app.kubernetes.io/name=external-secrets across the cluster.
  serviceMonitor:
    enabled: false
