# Manual PipelineRun example. Copy, edit `params:` for your repo + image, then:
#
#   kubectl -n image-builder apply -f pipelinerun-manual.yaml
#   tkn -n image-builder pipelinerun logs -L -f
#
# For repeat builds, prefer the EventListener webhook — this file is only for
# initial verification / debugging.
#
# IMPORTANT: there is no central `build-pipeline` any more. Each app ships its
# own Pipeline at <source-repo>/deploy/pipelines/<image-name>.yaml, deployed
# to this namespace via a sibling ArgoCD Application. The `pipelineRef.name`
# below MUST match an existing Pipeline in this namespace — for fleet, the
# Pipeline names are `fleet-backend` / `fleet-frontend`.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: build-manual-
  namespace: image-builder
spec:
  # Auto-prune 7 days after finish — same as webhook-triggered runs.
  ttlSecondsAfterFinished: 604800
  pipelineRef:
    name: fleet-backend          # change to the per-app Pipeline you want to run
  taskRunTemplate:
    serviceAccountName: pipeline-sa
  params:
    - name: git-url
      value: https://github.com/<org>/<repo>.git    # HTTPS URL — auth via envFrom Secret
    - name: git-revision
      value: main
    - name: image-name
      value: <repo-name>             # becomes <registry>/<repo-name>:<tag>
    - name: image-version
      value: "0.1.0"
    - name: containerfile
      value: Containerfile           # path inside the cloned repo
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 10Gi
          # storageClassName resolves to the platform default (microk8s-hostpath).
  # Note: git auth is HTTPS+PAT. Credentials come from the `image-builder-git-https`
  # Secret in this namespace (materialized by ESO from Vault); the git-clone Task
  # envFrom-mounts it, no workspace declaration needed.
