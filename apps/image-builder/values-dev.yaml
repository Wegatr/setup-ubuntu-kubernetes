# DEV-specific image-builder config. Phase A: image-builder runs on DEV only.
externalsecret-git-https:
  externalSecret:
    vaultPath: dev/app/image-builder

externalsecret-webhooks:
  externalSecret:
    vaultPath: dev/app/image-builder

# Zot push credentials live in the registry app's Vault entry, not in
# image-builder's. ESO authenticates from the image-builder namespace
# (per its own SecretStore) and reads the registry path directly.
externalsecret-registry-push:
  externalSecret:
    vaultPath: dev/app/registry
