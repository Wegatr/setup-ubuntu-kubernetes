{{- /*
logging-summary — emits a JSON summary of the PipelineRun's results. Runs
last (after all other tasks) so it has access to their results via params.
Saves the summary to source/.build-summary.json AND prints to stdout (so it
shows up in tkn logs / Loki).
*/ -}}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: logging-summary
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: image-builder
    app.kubernetes.io/component: task
spec:
  description: Aggregate PipelineRun results into a JSON summary.
  workspaces:
    - name: source
  params:
    - name: git-url
      type: string
    - name: git-revision
      type: string
    - name: image-reference
      type: string
    - name: image-digest
      type: string
    - name: image-tag
      type: string
    - name: build-timestamp
      type: string
    - name: status
      description: Overall status — caller sets to "success".
      type: string
      default: success
  steps:
    - name: summarize
      # alpine/jq was deleted from Docker Hub (May 2026 — namespace
      # 404s on the v2 API). Plain alpine + `apk add jq` is the same
      # pattern other tasks use and isn't tied to a maintainer-orphaned
      # image. apk install is sub-second on the alpine base layer.
      image: alpine:3.21
      workingDir: /workspace/source
      script: |
        #!/usr/bin/env sh
        set -eu

        apk add --no-cache --quiet jq >/dev/null

        jq -n \
          --arg git_url        "$(params.git-url)" \
          --arg git_revision   "$(params.git-revision)" \
          --arg image_ref      "$(params.image-reference)" \
          --arg image_digest   "$(params.image-digest)" \
          --arg image_tag      "$(params.image-tag)" \
          --arg build_ts       "$(params.build-timestamp)" \
          --arg status         "$(params.status)" \
          '{
            status:           $status,
            git: {
              url:            $git_url,
              revision:       $git_revision
            },
            image: {
              reference:      $image_ref,
              digest:         $image_digest,
              tag:            $image_tag,
              built_at:       $build_ts
            }
          }' | tee /workspace/source/.build-summary.json
      computeResources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
