{{- /*
git-clone — clones a source repo over HTTPS using a PAT-based credential
helper. Auth credentials are pulled from Vault by ESO into the
`image-builder-git-https` Secret in this namespace; this step envFroms
that Secret, writes a ~/.git-credentials file at start-up, and points git
at it via `credential.helper=store`. Git then auto-injects the matching
user:pat into every `https://<host>/...` clone URL.

The credentials value is multi-line — one `https://<user>:<pat>@<host>`
record per Git provider the platform builds from (GitHub / Bitbucket /
Azure DevOps). Git's credential-store matches by URL prefix, so multiple
providers coexist in one Secret without collision.

Adapted from tektoncd/catalog git-clone v0.9 (MIT). Simplified for our
single use case (HTTPS only, no submodules auto-init, no LFS).
*/ -}}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: image-builder
    app.kubernetes.io/component: task
spec:
  description: >-
    Clone a Git repo over HTTPS into the `source` workspace. Honors a
    single revision (branch / tag / commit SHA). Emits the resolved commit
    SHA as a result for downstream tasks (image tag, OCI labels).
  workspaces:
    - name: source
      description: Output workspace — the cloned repo lands here.
  params:
    - name: url
      description: HTTPS git URL (e.g. https://github.com/org/repo.git).
      type: string
    - name: revision
      description: Branch / tag / commit SHA to check out.
      type: string
      default: main
    - name: depth
      description: Shallow clone depth (0 = full clone).
      type: string
      default: "1"
    - name: subdirectory
      description: Subdirectory inside the workspace to clone into.
      type: string
      default: ""
  results:
    - name: commit
      description: Resolved commit SHA.
    - name: url
      description: Repository URL (echoed back for downstream tasks).
  steps:
    - name: clone
      image: alpine/git:2.45.2
      envFrom:
        # GITCREDENTIALS = multi-line value, one credential-store record
        # per provider. ESO pulls it from secret/<env>/app/image-builder
        # key `gitcredentials`. See externalsecret-git-https in values.
        - secretRef:
            name: image-builder-git-https
      env:
        - name: HOME
          value: /workspace/source
      workingDir: /workspace/source
      script: |
        #!/usr/bin/env sh
        set -eu

        # Materialize the git-credentials store file from the env var.
        # `printf '%s\n'` preserves the trailing newline that git expects
        # between records. Mode 600 — file contains PATs.
        printf '%s\n' "${GITCREDENTIALS}" > /tmp/git-credentials
        chmod 600 /tmp/git-credentials
        export HOME=/tmp
        git config --global credential.helper "store --file=/tmp/git-credentials"

        # Compose TARGET. Plain if/else avoids the `set -e` trap that fires
        # when a test inside `$( ... )` returns 1 (e.g. when subdirectory is
        # empty) — the failing exit status bubbles up to the assignment line
        # and kills the script before any echo runs.
        if [ -n "$(params.subdirectory)" ]; then
          TARGET="/workspace/source/$(params.subdirectory)"
        else
          TARGET="/workspace/source"
        fi
        mkdir -p "$TARGET"
        cd "$TARGET"

        if [ "$(params.depth)" != "0" ]; then
          DEPTH_FLAG="--depth=$(params.depth)"
        else
          DEPTH_FLAG=""
        fi

        echo "Cloning $(params.url)@$(params.revision) into $TARGET (depth=$(params.depth))"
        git init
        git remote add origin "$(params.url)"
        # shellcheck disable=SC2086
        git fetch $DEPTH_FLAG origin "$(params.revision)"
        git checkout FETCH_HEAD

        RESOLVED_SHA="$(git rev-parse HEAD)"
        echo "Cloned $(params.url)@$(params.revision) -> $RESOLVED_SHA"
        printf "%s" "$RESOLVED_SHA" > $(results.commit.path)
        printf "%s" "$(params.url)" > $(results.url.path)
      computeResources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
