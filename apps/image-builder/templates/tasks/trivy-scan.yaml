{{- /*
trivy-scan — scans the just-built image by digest. Fails the PipelineRun if
any HIGH or CRITICAL vulnerability is found. Honors `.trivyignore` from the
source workspace so per-app waivers travel with the code.

The vulnerability DB lives on a PVC (workspace `trivy-db-cache`) to avoid
re-downloading ~600MB on every run. The DB self-updates every 6h.
*/ -}}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-scan
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: image-builder
    app.kubernetes.io/component: task
spec:
  description: Scan an image with Trivy; fail on HIGH/CRITICAL.
  workspaces:
    - name: source
      description: Used only to read an optional .trivyignore.
    - name: trivy-db-cache
      description: PVC-backed cache for the vulnerability DB.
      mountPath: /trivy-cache
  params:
    - name: image-reference
      description: Full image reference (registry/name:tag) to scan.
      type: string
    - name: image-digest
      description: Image digest (sha256:...). Used to ensure scan-by-digest.
      type: string
    - name: severity
      description: Comma-separated severity levels to fail on.
      type: string
      default: HIGH,CRITICAL
    - name: registry
      description: Registry hostname.
      type: string
      default: {{ tpl .Values.pipeline.registry . | quote }}
  results:
    # Surfaced in Tekton Dashboard's PipelineRun detail panel + visible at
    # the PR list level. Lets you see "HIGH: 1, CRITICAL: 0" at a glance
    # without drilling into the trivy step log.
    - name: cve-critical
      description: Count of CRITICAL severity vulnerabilities found (after --ignore-unfixed filter).
    - name: cve-high
      description: Count of HIGH severity vulnerabilities found (after --ignore-unfixed filter).
    - name: cve-summary
      description: One-line human-readable summary, e.g. "CRITICAL=0 HIGH=1".
  steps:
    - name: scan
      image: aquasec/trivy:0.70.0
      env:
        - name: TRIVY_CACHE_DIR
          value: /trivy-cache
        - name: TRIVY_NO_PROGRESS
          value: "true"
      envFrom:
        # REGISTRY_USERNAME + REGISTRY_PASSWORD from the same Secret used by
        # buildah-build-push (image-builder-registry-push, materialized by
        # apps/image-builder/Chart.yaml dep externalsecret-registry-push from
        # Vault path <env>/app/registry). Re-exported as TRIVY_USERNAME +
        # TRIVY_PASSWORD inside the script so Trivy auto-detects them when
        # pulling the just-pushed image by reference.
        - secretRef:
            name: image-builder-registry-push
      workingDir: /workspace/source
      script: |
        #!/usr/bin/env sh
        set -eu

        # jq isn't in the upstream trivy image by default; the runtime is
        # Alpine-based so apk add is a sub-second operation.
        apk add --no-cache --quiet jq >/dev/null

        # Trivy reads TRIVY_USERNAME/PASSWORD when pulling from a private
        # registry. Remap from the canonical REGISTRY_* secret keys.
        export TRIVY_USERNAME="${REGISTRY_USERNAME}"
        export TRIVY_PASSWORD="${REGISTRY_PASSWORD}"

        TARGET="$(params.image-reference)@$(params.image-digest)"

        # Pass --trivyignores only if the file exists in the source workspace.
        TRIVYIGNORE_FLAG=""
        if [ -f /workspace/source/.trivyignore ]; then
          TRIVYIGNORE_FLAG="--ignorefile /workspace/source/.trivyignore"
        fi

        # PASS 1 — full JSON dump, never aborts. Used to extract CVE counts
        # for the TaskRun results. --severity covers all so the JSON has
        # every finding; the count then filters by HIGH/CRITICAL.
        echo "Scanning $TARGET (JSON pass — for results extraction)"
        # shellcheck disable=SC2086
        trivy image \
          --exit-code 0 \
          --ignore-unfixed \
          $TRIVYIGNORE_FLAG \
          --format json \
          --output /tmp/trivy.json \
          "$TARGET"

        CRIT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' /tmp/trivy.json)
        HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' /tmp/trivy.json)
        echo "CVE counts: CRITICAL=$CRIT  HIGH=$HIGH"

        # Emit TaskRun results BEFORE the gating pass so they're available
        # even when the gating pass fails (Tekton captures termination msg
        # only when the container exits — write before the gate exits 1).
        printf "%s" "$CRIT"                         > $(results.cve-critical.path)
        printf "%s" "$HIGH"                         > $(results.cve-high.path)
        printf "CRITICAL=%s HIGH=%s" "$CRIT" "$HIGH" > $(results.cve-summary.path)

        # PASS 2 — human-readable table + gating. Fails the step if any
        # CVE at the configured severity is found. This is what the user
        # sees in Tekton Dashboard's step logs panel.
        echo "Scanning $TARGET (table + gate, severity=$(params.severity))"
        # shellcheck disable=SC2086
        trivy image \
          --severity "$(params.severity)" \
          --exit-code 1 \
          --ignore-unfixed \
          $TRIVYIGNORE_FLAG \
          --format table \
          "$TARGET"
      computeResources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 2Gi
