{{- /*
yq-git-bump — generic write-back task for app pipelines.

Clones a target Git repo, edits a single YAML scalar with yq, commits,
and pushes back. Used by app-owned pipelines (deploy/pipelines/*.yaml
in each app repo) to bump their own image tags in their own Helm chart
values file after a successful build.

Push-conflict recovery: if `git push` is rejected because another build
has landed a commit on the target branch in the meantime, the task
fetches + rebases its single edit on top of the new HEAD and retries
(up to 5 times). yq is deterministic on the same input → second build's
rebase replays cleanly even if the first build also bumped the same tag.

Auth: reuses `image-builder-git-https` Secret (envFrom GITCREDENTIALS),
materialized by ESO from Vault path `secret/<env>/app/image-builder` key
`gitcredentials`. The PAT in that file must have Code:Read & Write on
the target repo. Username convention: `pat` for Azure DevOps, `oauth2`
for GitHub, `x-token-auth` for Bitbucket — same as git-clone.
*/ -}}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: yq-git-bump
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: image-builder
    app.kubernetes.io/component: task
spec:
  description: >-
    Clone repo, yq -i a single YAML field, commit + push back. Retries
    on push conflict via fetch + rebase.
  params:
    - name: repo-url
      description: HTTPS git URL of the target repo (where the values file lives).
      type: string
    - name: branch
      description: Branch to clone and push to.
      type: string
      default: master
    - name: file-path
      description: Path of the YAML file inside the repo (e.g. deploy/chart/values-dev.yaml).
      type: string
    - name: yaml-path
      description: yq expression to update (e.g. .images.backend.tag).
      type: string
    - name: new-value
      description: New scalar value to set at yaml-path.
      type: string
    - name: commit-message
      description: Commit message. Default includes file-path, yaml-path, new-value.
      type: string
      default: ""
    - name: git-user-name
      type: string
      default: image-builder
    - name: git-user-email
      type: string
      default: image-builder@platform
  steps:
    - name: bump
      image: alpine/git:2.45.2
      envFrom:
        - secretRef:
            name: image-builder-git-https
      env:
        - name: HOME
          value: /tmp
      script: |
        #!/usr/bin/env sh
        set -eu

        # yq isn't in alpine/git — add it (binary download, ~5MB, ~2s).
        # apk pulls the alpine community repo which has yq packaged.
        apk add --no-cache --quiet yq >/dev/null

        # git-credentials store — same pattern as git-clone task.
        printf '%s\n' "${GITCREDENTIALS}" > /tmp/git-credentials
        chmod 600 /tmp/git-credentials
        git config --global credential.helper "store --file=/tmp/git-credentials"
        git config --global user.name  "$(params.git-user-name)"
        git config --global user.email "$(params.git-user-email)"

        WORKDIR=/tmp/bump-repo
        rm -rf "$WORKDIR"
        echo "Cloning $(params.repo-url) branch $(params.branch)"
        git clone --depth=1 --branch "$(params.branch)" "$(params.repo-url)" "$WORKDIR"
        cd "$WORKDIR"

        FILE="$(params.file-path)"
        EXPR="$(params.yaml-path)"
        VAL="$(params.new-value)"

        if [ ! -f "$FILE" ]; then
          echo "ERROR: $FILE not found in cloned repo"
          exit 1
        fi

        # Compute pre/post values to skip the commit if nothing changed
        # (idempotent re-runs / accidental double-fires don't pollute history).
        BEFORE="$(yq "$EXPR" "$FILE")"
        if [ "$BEFORE" = "$VAL" ]; then
          echo "No-op: $FILE $EXPR already == $VAL"
          exit 0
        fi

        echo "Bump: $FILE $EXPR :  $BEFORE  ->  $VAL"
        yq -i "$EXPR = \"$VAL\"" "$FILE"

        MSG="$(params.commit-message)"
        if [ -z "$MSG" ]; then
          MSG="bump: $FILE $EXPR -> $VAL"
        fi
        git add "$FILE"
        git commit -m "$MSG"

        # Push with rebase-retry on conflict. Limited to 5 attempts so
        # a misconfigured branch protection / permission denied fails
        # fast instead of looping forever.
        ATTEMPT=0
        while [ "$ATTEMPT" -lt 5 ]; do
          ATTEMPT=$((ATTEMPT+1))
          if git push origin "HEAD:$(params.branch)"; then
            echo "Pushed on attempt $ATTEMPT"
            exit 0
          fi
          echo "Push rejected (attempt $ATTEMPT). Fetching + rebasing..."
          git fetch origin "$(params.branch)"
          # rebase our single commit on top of the new remote head.
          # If yq's edit conflicts with another bump (same key, same file),
          # we keep ours — the build that ran later represents the freshest
          # tag and should win.
          git rebase -X ours "origin/$(params.branch)" || {
            echo "ERROR: rebase failed unexpectedly — manual intervention required"
            git rebase --abort || true
            exit 1
          }
        done
        echo "ERROR: failed to push after $ATTEMPT attempts"
        exit 1
      computeResources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
