{{- /*
credential-scan — runs gitleaks across the cloned source. Fails the
PipelineRun on any leaked secret. Honors `.gitleaks.toml` from the source
workspace for per-repo configuration / allowlists.
*/ -}}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: credential-scan
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: image-builder
    app.kubernetes.io/component: task
spec:
  description: Scan the source tree for leaked credentials with gitleaks.
  workspaces:
    - name: source
  steps:
    - name: gitleaks
      image: zricethezav/gitleaks:v8.21.2
      workingDir: /workspace/source
      script: |
        #!/usr/bin/env sh
        set -eu

        CONFIG_FLAG=""
        if [ -f /workspace/source/.gitleaks.toml ]; then
          CONFIG_FLAG="--config=/workspace/source/.gitleaks.toml"
        fi

        echo "Running gitleaks against /workspace/source"
        # shellcheck disable=SC2086
        gitleaks detect \
          --source=/workspace/source \
          --no-banner \
          --redact \
          --exit-code=1 \
          $CONFIG_FLAG
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
