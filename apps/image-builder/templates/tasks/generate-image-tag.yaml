{{- /*
generate-image-tag — composes a unique, sortable tag from a semver base + the
build's UTC timestamp. Format: `<version>.<YYYYMMDD>T<HHMMSS>Z`.
Example: 1.0.0.20260514T120000Z.

The result `image-tag` flows to buildah-build-push (as the push tag) and to
trivy-scan / logging-summary. Pinning the timestamp upfront keeps subsequent
tasks consistent — they all see the same tag string.
*/ -}}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: generate-image-tag
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: image-builder
    app.kubernetes.io/component: task
spec:
  description: Produce a unique image tag from semver + UTC timestamp.
  params:
    - name: version
      description: Semver base (e.g. "1.0.0"). Caller decides bumps.
      type: string
      default: "0.0.0"
  results:
    - name: image-tag
      description: Composed image tag.
    - name: build-timestamp
      description: UTC timestamp portion (for OCI label org.opencontainers.image.created).
  steps:
    - name: compose
      image: busybox:1.36
      script: |
        #!/bin/sh
        set -eu
        TS="$(date -u +%Y%m%dT%H%M%SZ)"
        TAG="$(params.version).${TS}"
        echo "Generated tag: $TAG"
        printf "%s" "$TAG" > $(results.image-tag.path)
        # ISO-8601 form for the OCI label.
        printf "%s" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > $(results.build-timestamp.path)
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 64Mi
