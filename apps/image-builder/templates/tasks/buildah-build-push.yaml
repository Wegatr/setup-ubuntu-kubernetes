{{- /*
buildah-build-push — builds an OCI image from a Containerfile in the source
workspace, applies the four standard org.opencontainers.image.* labels, logs
into the Zot registry with push-user credentials envFromSecret'd from
image-builder-registry-push, and pushes the image. Buildah is invoked with
TLS verification enabled (Zot has a real LE cert via Ingress).

MicroK8s specifics:
  - STORAGE_DRIVER=vfs. The default overlay driver requires fuse + a kernel
    config that MicroK8s' default kubelet doesn't expose; vfs is slower but
    just works.
  - BUILDAH_FORMAT=oci. Default docker manifest format works too but oci is
    the modern default and Trivy handles both.
  - privileged: true. Buildah needs CAP_SYS_ADMIN for the underlying chroot
    operations. PodSecurityStandards on MicroK8s default-allow this; if you
    enable PSA, mark the image-builder namespace `privileged`.

The image-digest result is consumed by trivy-scan (scans by digest, not tag,
to avoid TOCTOU between push and scan).
*/ -}}
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: buildah-build-push
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: image-builder
    app.kubernetes.io/component: task
spec:
  description: Build a Containerfile with Buildah and push to the registry.
  workspaces:
    - name: source
      description: Contains the Containerfile and build context.
  params:
    - name: image-name
      description: Image name (registry path WITHOUT tag), e.g. myapp.
      type: string
    - name: image-tag
      description: Tag to push (from generate-image-tag).
      type: string
    - name: registry
      description: Registry hostname.
      type: string
      default: {{ tpl .Values.pipeline.registry . | quote }}
    - name: containerfile
      description: Path to the Containerfile inside the source workspace.
      type: string
      default: Containerfile
    - name: context
      description: Build context dir inside the source workspace.
      type: string
      default: "."
    - name: git-url
      description: For OCI label org.opencontainers.image.source.
      type: string
    - name: git-revision
      description: Resolved commit SHA for OCI label .revision.
      type: string
    - name: build-timestamp
      description: ISO-8601 UTC timestamp for OCI label .created.
      type: string
    - name: version
      description: Semver base for OCI label .version.
      type: string
  results:
    - name: image-digest
      description: Pushed image digest (sha256:...).
    - name: image-reference
      description: Fully-qualified image reference (registry/name:tag).
  steps:
    - name: build-and-push
      image: quay.io/buildah/stable:v1.43.1
      env:
        - name: STORAGE_DRIVER
          value: vfs
        - name: BUILDAH_FORMAT
          value: oci
      envFrom:
        # REGISTRY_USERNAME + REGISTRY_PASSWORD pulled by ESO from Vault
        # (secret/<env>/app/registry, properties push-user + push-password).
        # See apps/image-builder/Chart.yaml dep externalsecret-registry-push.
        - secretRef:
            name: image-builder-registry-push
      securityContext:
        privileged: true
        runAsUser: 0
      workingDir: /workspace/source/$(params.context)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        IMAGE_REF="$(params.registry)/$(params.image-name):$(params.image-tag)"
        echo "Building $IMAGE_REF from $(params.containerfile)"

        # Log into Zot. Credentials are envFrom-injected above (never appear
        # in argv or in the rendered Pipeline params).
        echo "Logging into $(params.registry) as ${REGISTRY_USERNAME}"
        buildah --storage-driver=vfs login \
          --username "${REGISTRY_USERNAME}" \
          --password-stdin \
          "$(params.registry)" <<< "${REGISTRY_PASSWORD}"

        buildah --storage-driver=vfs bud \
          --format=oci \
          --label "org.opencontainers.image.source=$(params.git-url)" \
          --label "org.opencontainers.image.revision=$(params.git-revision)" \
          --label "org.opencontainers.image.created=$(params.build-timestamp)" \
          --label "org.opencontainers.image.version=$(params.version)" \
          -f "$(params.containerfile)" \
          -t "$IMAGE_REF" \
          .

        echo "Pushing $IMAGE_REF"
        buildah --storage-driver=vfs push \
          --digestfile /tmp/digest \
          "$IMAGE_REF" \
          "docker://$IMAGE_REF"

        DIGEST="$(cat /tmp/digest)"
        echo "Pushed: $IMAGE_REF @ $DIGEST"
        printf "%s" "$DIGEST" > $(results.image-digest.path)
        printf "%s" "$IMAGE_REF" > $(results.image-reference.path)

        # Drop the cached credentials from the build worker filesystem.
        buildah --storage-driver=vfs logout "$(params.registry)" || true
      computeResources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 4Gi

    - name: notify-image-updater
      # Event-driven trigger: tell argocd-image-updater (running in
      # the `argocd` namespace) that a fresh image landed. The
      # cluster-internal webhook Service has no Ingress — only
      # reachable from inside the cluster — so no auth header needed
      # here. Image Updater scans the Application annotations,
      # validates the new tag against `allow-tags`, commits the
      # values-<env>.yaml bump, ArgoCD reconciles.
      #
      # Dockerhub-format payload because Image Updater's webhook
      # handler accepts that out of the box (the controller routes
      # by Content-Type / payload shape, not registry hostname).
      #
      # `|| true` keeps the pipeline green if the webhook is briefly
      # unreachable — fallback is the operator manually bumping the
      # tag, but in practice Image Updater self-recovers on the next
      # event from a later build.
      image: curlimages/curl:8.18.0
      script: |
        #!/bin/sh
        set -eu
        IMAGE_REF="$(params.registry)/$(params.image-name):$(params.image-tag)"
        echo "Notifying argocd-image-updater of new image: $IMAGE_REF"
        curl -fsS \
          -X POST \
          -H 'Content-Type: application/json' \
          --max-time 10 \
          --data "{\"push_data\":{\"tag\":\"$(params.image-tag)\"},\"repository\":{\"repo_name\":\"$(params.registry)/$(params.image-name)\"}}" \
          'http://argocd-image-updater-webhook.image-updater.svc.cluster.local:8080/api/webhook' \
          || echo "WARN: webhook POST failed — Image Updater will not auto-bump this build; trigger manually if needed"
      computeResources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 64Mi
