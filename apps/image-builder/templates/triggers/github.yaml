{{- if and .Values.eventListener.enabled .Values.eventListener.triggers.github.enabled }}
{{- /*
GitHub push event → PipelineRun.

Uses Tekton's built-in `github` ClusterInterceptor which validates the
X-Hub-Signature-256 HMAC header against the secret in
`image-builder-webhook-secrets.github`. The CEL filter restricts to push
events on matching branches.

The CEL overlays compute two values that the TriggerBinding consumes:
  - extensions.image-name    : `X-Image-Name` header if set, else
                                `body.repository.name`. Lets a monorepo
                                use one webhook per component with a
                                custom header overriding the repo name.
  - extensions.containerfile : `X-Containerfile` header if set, else
                                `"Containerfile"` (repo-root default).
*/ -}}
apiVersion: triggers.tekton.dev/v1beta1
kind: Trigger
metadata:
  name: github-push
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: image-builder
    app.kubernetes.io/component: trigger
    provider: github
spec:
  interceptors:
    - ref:
        name: github
      params:
        - name: secretRef
          value:
            secretName: image-builder-webhook-secrets
            secretKey: github
        - name: eventTypes
          value: ["push"]
    - ref:
        name: cel
      params:
        - name: overlays
          value:
            - key: image-name
              expression: >-
                header.canonical('X-Image-Name').size() > 0
                ? header.canonical('X-Image-Name')
                : body.repository.name
            - key: containerfile
              expression: >-
                header.canonical('X-Containerfile').size() > 0
                ? header.canonical('X-Containerfile')
                : 'Containerfile'
        - name: filter
          # Match a push to one of the configured branches. Anchor the whole
          # ref (`^refs/heads/(<regex>)$`) — Tekton's CEL has NO list `.slice()`,
          # so the old `body.ref.split('/').slice(2).join('/')` threw
          # InvalidArgument on every push and silently dropped it. Anchoring
          # also avoids the unanchored over-match (e.g. `mainline`).
          # Also skip pushes where every commit is from `image-builder@platform`
          # (the app-pipeline bot author for version-bump + tag-bump
          # write-back). Without this every bump commit would re-trigger a
          # build → infinite loop. Pushes with ≥1 human commit still build.
          value: >-
            body.ref.matches('^refs/heads/({{ .Values.eventListener.triggers.github.branchFilter }})$') &&
            !(body.commits.size() > 0 &&
              body.commits.all(c, c.author.email == 'image-builder@platform'))
  bindings:
    - ref: github-binding
  template:
    ref: image-build
{{- end }}
