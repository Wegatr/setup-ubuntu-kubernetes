{{- if and .Values.eventListener.enabled .Values.eventListener.triggers.bitbucket.enabled }}
{{- /*
Bitbucket push event → PipelineRun.

Uses Tekton's built-in `bitbucket` ClusterInterceptor which validates the
X-Hub-Signature header (HMAC) against `image-builder-webhook-secrets.bitbucket`.
The CEL filter matches push events on configured branches.

CEL overlays compute extensions.image-name + extensions.containerfile —
see github.yaml for the rationale (X-Image-Name / X-Containerfile
headers override the payload-derived defaults).
*/ -}}
apiVersion: triggers.tekton.dev/v1beta1
kind: Trigger
metadata:
  name: bitbucket-push
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: image-builder
    app.kubernetes.io/component: trigger
    provider: bitbucket
spec:
  interceptors:
    - ref:
        name: bitbucket
      params:
        - name: secretRef
          value:
            secretName: image-builder-webhook-secrets
            secretKey: bitbucket
        - name: eventTypes
          value: ["repo:push"]
    - ref:
        name: cel
      params:
        - name: overlays
          value:
            - key: image-name
              expression: >-
                header.canonical('X-Image-Name').size() > 0
                ? header.canonical('X-Image-Name')
                : body.repository.name
            - key: containerfile
              expression: >-
                header.canonical('X-Containerfile').size() > 0
                ? header.canonical('X-Containerfile')
                : 'Containerfile'
        - name: filter
          # Bitbucket payload: each push has changes[].new.name = branch.
          # Also skip pushes where every commit is from `image-builder@platform`
          # (the app-pipeline bot author for version-bump + tag-bump
          # write-back). Bitbucket exposes author as `raw: "Name <email>"`,
          # so we check the raw string contains the bot email. Without this
          # the bump commit would re-trigger a build → infinite loop.
          value: >-
            body.push.changes.exists(c, c.new != null && c.new.type == 'branch'
            && c.new.name.matches('{{ .Values.eventListener.triggers.bitbucket.branchFilter }}')) &&
            !body.push.changes.all(c,
              c.commits.size() > 0 &&
              c.commits.all(co, co.author.raw.contains('<image-builder@platform>')))
  bindings:
    - ref: bitbucket-binding
  template:
    ref: image-build
{{- end }}
