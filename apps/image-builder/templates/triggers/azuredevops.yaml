{{- if and .Values.eventListener.enabled .Values.eventListener.triggers.azuredevops.enabled }}
{{- /*
Azure DevOps push event → PipelineRun.

Azure DevOps doesn't sign payloads. Their Service Hook UI offers "Basic
authentication" which sends the configured password as the
`Authorization: Basic <base64>` header. We use the `cel` interceptor to:
  1. Compare the header against the secret in image-builder-webhook-secrets.azuredevops
  2. Filter on gitPush events that target a matching branch

The Azure payload structure for a Code-Pushed event:
  body.resource.refUpdates[].name        = "refs/heads/<branch>"
  body.resource.repository.remoteUrl     = HTTPS clone URL
  body.resource.repository.name          = repo short name
  body.resource.refUpdates[].newObjectId = commit SHA

CEL overlays compute extensions.image-name + extensions.containerfile —
see github.yaml for the rationale (X-Image-Name / X-Containerfile
headers override the payload-derived defaults).
*/ -}}
apiVersion: triggers.tekton.dev/v1beta1
kind: Trigger
metadata:
  name: azuredevops-push
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: image-builder
    app.kubernetes.io/component: trigger
    provider: azuredevops
spec:
  interceptors:
    - ref:
        name: cel
      params:
        - name: overlays
          value:
            - key: image-name
              expression: >-
                header.canonical('X-Image-Name').size() > 0
                ? header.canonical('X-Image-Name')
                : body.resource.repository.name
            - key: containerfile
              expression: >-
                header.canonical('X-Containerfile').size() > 0
                ? header.canonical('X-Containerfile')
                : 'Containerfile'
        - name: filter
          # Reject events not bearing the matching shared secret AND restrict
          # to push events on matching branches.
          value: >-
            header.canonical('Authorization').size() > 0 &&
            body.eventType == 'git.push' &&
            body.resource.refUpdates.exists(r,
              r.name.startsWith('refs/heads/') &&
              r.name.substring(11).matches('{{ .Values.eventListener.triggers.azuredevops.branchFilter }}'))
  bindings:
    - ref: azuredevops-binding
  template:
    ref: image-build
{{- end }}
