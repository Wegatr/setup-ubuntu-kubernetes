{{- /*
Minimum RBAC for the pipeline-sa ServiceAccount. The Tekton controllers in
tekton-pipelines already have cluster-wide rights to manage Pods/TaskRuns —
this Role only covers what the PipelineRun's own steps need to do:
  - read mounted Secrets (ssh-credentials, dockerconfig, webhook-secrets)
  - create/delete the workspace PVCs Tekton provisions per-run
  - list TaskRuns / PipelineRuns to assemble the logging-summary task output
*/ -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.pipeline.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns", "taskruns"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.pipeline.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.pipeline.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.pipeline.serviceAccountName }}
{{- /*
Tekton Triggers' EventListener pod needs its own ServiceAccount with
permission to create PipelineRuns + TaskRuns. The controller installs this
RBAC cluster-wide when Triggers itself is installed, but the EventListener's
SA must exist in our namespace and bind to the appropriate ClusterRole.

We reuse pipeline-sa for the EventListener — it already has list rights on
pipelineruns; the create right comes from the ClusterRoleBinding below, which
binds to Tekton Triggers' built-in `tekton-triggers-eventlistener-roles`
ClusterRole.
*/}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.pipeline.serviceAccountName }}-triggers
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.pipeline.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-roles
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.pipeline.serviceAccountName }}-triggers-clusterinterceptors
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.pipeline.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-clusterroles
