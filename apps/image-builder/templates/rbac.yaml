{{- /*
RBAC is split across TWO ServiceAccounts so that PipelineRun pods (which
execute app-owned, partially tenant-authored task code) never hold API
read access to the namespace's Secrets:

  pipeline-sa (pipeline.serviceAccountName)
    Runs every PipelineRun pod. Steps consume Secrets exclusively via
    envFrom / volume mounts — kubelet mounts those with NO API permission
    needed — so this SA gets no secrets/configmaps access at all. It keeps:
      - create/delete on the workspace PVCs Tekton provisions per-run
      - read on TaskRuns / PipelineRuns for inline tasks that inspect
        run state
    Tenant pipelines run under this SA too (triggertemplate.yaml) — keep
    it minimal; a tenant task that needs a Secret must mount it.

  eventlistener-sa (pipeline.eventListenerServiceAccountName)
    Runs the EventListener pod only. Binds to Tekton Triggers' built-in
    ClusterRoles (namespaced via RoleBinding):
      - tekton-triggers-eventlistener-roles: read Trigger* CRs +
        configmaps, create PipelineRuns, impersonate ServiceAccounts
      - tekton-triggers-eventlistener-clusterroles: read
        ClusterTriggerBindings / ClusterInterceptors + namespace Secrets
        (interceptor secretRef resolution for webhook HMAC verification)
*/ -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.pipeline.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns", "taskruns"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.pipeline.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.pipeline.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.pipeline.serviceAccountName }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.pipeline.eventListenerServiceAccountName }}-triggers
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.pipeline.eventListenerServiceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-roles
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.pipeline.eventListenerServiceAccountName }}-triggers-clusterinterceptors
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.pipeline.eventListenerServiceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-clusterroles
