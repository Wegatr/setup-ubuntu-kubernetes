{{- if .Values.eventListener.enabled }}
{{- /*
TriggerTemplate — common shape consumed by all three provider Triggers. Each
binding feeds the same five params; the template spawns a PipelineRun.

App-owned pipeline lookup: the Pipeline is NOT defined in this repo. Each
app ships its own Pipeline manifests in `<source-repo>/deploy/pipelines/
<image-name>.yaml`, deployed to the `image-builder` namespace by the app's
own ArgoCD Application. The EventListener simply references the Pipeline
by name (== image-name == filename basename).

So `X-Image-Name: fleet-backend` looks up Pipeline `fleet-backend` in this
namespace. fleet-tracker's deploy/pipelines/fleet-backend.yaml provides it.

Platform provides the shared Task library (git-clone, buildah-build-push,
credential-scan, generate-image-tag, yq-git-bump, logging-summary) in this
namespace. App pipelines reference those via Tekton's `cluster` resolver.

Workspaces:
  - source : volumeClaimTemplate (10Gi) — fresh per run

Git auth is HTTPS+PAT, materialized as a Secret in this namespace by ESO
(externalsecret-git-https) and consumed via `envFrom secretRef` inside
the git-clone Task step — no workspace mount needed.
*/ -}}
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: image-build
  namespace: {{ .Release.Namespace }}
spec:
  params:
    - name: git-url
      description: HTTPS URL of the source repo.
    - name: git-revision
      description: Commit SHA to build.
    - name: image-name
      description: Image name (no registry, no tag) — typically the repo name OR an X-Image-Name header override for monorepos. MUST match a Pipeline of the same name in this namespace.
    - name: image-version
      description: Semver base; default "0.0.0".
      default: "0.0.0"
    - name: containerfile
      description: Path inside the cloned repo to the Containerfile. Default `Containerfile` at root; monorepos pass via X-Containerfile header.
      default: Containerfile
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        # Embed image-name in the PR name so `tkn pr list` and Tekton
        # Dashboard's list view make it obvious which app each run builds
        # — e.g. `build-fleet-frontend-abc12` instead of `build-abc12`.
        # K8s name limit is 253; image-name is typically <30 chars.
        generateName: build-$(tt.params.image-name)-
        namespace: {{ .Release.Namespace }}
        labels:
          app.kubernetes.io/name: image-builder
          # NB: no static `tekton.dev/pipeline` label — the pipeline name
          # equals image-name dynamically. Filter by image-name:
          #   tkn pr list -l image-builder.io/image-name=fleet-backend
          image-builder.io/image-name: $(tt.params.image-name)
        annotations:
          # Full repo URL + commit SHA — visible in Dashboard's PR detail.
          # Annotations (not labels) because git-url contains slashes/colons
          # which aren't valid label values, and full SHAs are 40 chars
          # which is fine for either but cleaner as annotations.
          image-builder.io/git-url: $(tt.params.git-url)
          image-builder.io/git-revision: $(tt.params.git-revision)
      spec:
        # Auto-prune the PipelineRun + its child TaskRuns + pods 7 days
        # after the run finishes (K8s built-in TTL controller). Prevents
        # the cluster from accumulating runs indefinitely.
        ttlSecondsAfterFinished: 604800
        # Pipeline name == image-name (e.g. fleet-backend). Pipeline is
        # provided by the app's chart (deployed into this namespace by the
        # app's own ArgoCD Application from <repo>/deploy/pipelines/).
        # PipelineRun fails fast with "pipelines.tekton.dev not found" if
        # the app hasn't shipped its pipeline yet — clear signal to fix it
        # on the app side, not here.
        pipelineRef:
          name: $(tt.params.image-name)
        taskRunTemplate:
          serviceAccountName: {{ .Values.pipeline.serviceAccountName }}
        params:
          - name: git-url
            value: $(tt.params.git-url)
          - name: git-revision
            value: $(tt.params.git-revision)
          - name: image-name
            value: $(tt.params.image-name)
          - name: image-version
            value: $(tt.params.image-version)
          - name: containerfile
            value: $(tt.params.containerfile)
        workspaces:
          - name: source
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                resources:
                  requests:
                    storage: {{ .Values.workspaces.sourceSize | quote }}
                storageClassName: {{ .Values.global.storageClass | quote }}
{{- end }}
