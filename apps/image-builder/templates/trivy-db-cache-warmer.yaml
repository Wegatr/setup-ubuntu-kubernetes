{{- if .Values.trivyDbCache.enabled }}
{{- /*
PVC binding warmer.

The trivy-db-cache PVC uses `microk8s-hostpath` with
`volumeBindingMode: WaitForFirstConsumer` (cluster default). Without a
consumer pod, the PVC sits in Pending forever and ArgoCD surfaces the
whole image-builder Application as `Progressing`.

This tiny Deployment runs a single pause container that mounts the PVC,
which:
  • triggers binding (PVC → Bound, PV provisioned on this node)
  • stays running so the PVC remains Bound between Tekton PipelineRuns
  • survives PipelineRun pods coming + going — they can co-mount the same
    RWO PVC because they all land on the same single-node MicroK8s host

Resources are negligible: pause is the kernel's no-op container (~700 KB
image, idle CPU ~0, RSS ~5 MiB).
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trivy-db-cache-warmer
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: image-builder
    app.kubernetes.io/component: pvc-warmer
spec:
  replicas: 1
  strategy:
    type: Recreate          # RWO PVC — don't roll, swap.
  selector:
    matchLabels:
      app.kubernetes.io/name: image-builder
      app.kubernetes.io/component: pvc-warmer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: image-builder
        app.kubernetes.io/component: pvc-warmer
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
            limits:
              cpu: 10m
              memory: 16Mi
          volumeMounts:
            - name: trivy-db-cache
              mountPath: /cache
      volumes:
        - name: trivy-db-cache
          persistentVolumeClaim:
            claimName: trivy-db-cache
{{- end }}
