{{- if .Values.eventListener.enabled }}
{{- /*
TriggerBindings — map per-provider webhook payload fields to the shared
TriggerTemplate's `params:`. Each Trigger references its own binding.

The TriggerTemplate (templates/triggertemplate.yaml) expects:
  - git-url       (string)   HTTPS URL of the source repo
  - git-revision  (string)   commit SHA to build
  - image-name    (string)   image name (without registry/tag)
  - image-version (string)   semver base — taken from the repo's name or a
                              hard-coded "0.0.0" default; callers can override.

For all three providers, image-name defaults to the repository's short name.
For image-version we use "0.0.0" — semver bumps are typically tied to git
tags, which are out of scope for a push-triggered build. If you push a tag
instead, the github/bitbucket Interceptors will filter it out by default
(branchFilter regex).

Git auth is HTTPS+PAT, materialized as Secret `image-builder-git-https`
by ESO in this namespace; the git-clone Task envFroms it. Bindings emit
HTTPS clone URLs (so `credential.helper=store` can match).
*/ -}}
{{- if .Values.eventListener.triggers.github.enabled }}
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-binding
  namespace: {{ .Release.Namespace }}
spec:
  params:
    - name: git-url
      # GitHub's push payload has both `ssh_url` and `clone_url` — the
      # latter is the HTTPS form (https://github.com/<owner>/<repo>.git).
      value: $(body.repository.clone_url)
    - name: git-revision
      value: $(body.after)
    - name: image-name
      value: $(body.repository.name)
    - name: image-version
      value: "0.0.0"
{{- end }}
{{- if .Values.eventListener.triggers.bitbucket.enabled }}
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: bitbucket-binding
  namespace: {{ .Release.Namespace }}
spec:
  params:
    - name: git-url
      # Bitbucket's payload exposes clone URLs under links.clone[] indexed
      # by name. TriggerBinding doesn't run CEL, so we compose the HTTPS
      # URL from the repository's full_name (works for bitbucket.org —
      # for self-hosted Bitbucket Server, override via webhook query
      # parameters at the Service Hook config side).
      value: "https://bitbucket.org/$(body.repository.full_name).git"
    - name: git-revision
      value: $(body.push.changes[0].new.target.hash)
    - name: image-name
      value: $(body.repository.name)
    - name: image-version
      value: "0.0.0"
{{- end }}
{{- if .Values.eventListener.triggers.azuredevops.enabled }}
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: azuredevops-binding
  namespace: {{ .Release.Namespace }}
spec:
  params:
    - name: git-url
      # Azure DevOps's push event exposes both `sshUrl` and `remoteUrl`;
      # `remoteUrl` is the HTTPS clone URL (https://<org>@dev.azure.com/
      # <org>/<project>/_git/<repo>). Git's credential.helper=store
      # matches by URL prefix — `https://...@dev.azure.com` line in
      # `gitcredentials` injects the PAT on clone.
      value: $(body.resource.repository.remoteUrl)
    - name: git-revision
      value: $(body.resource.refUpdates[0].newObjectId)
    - name: image-name
      value: $(body.resource.repository.name)
    - name: image-version
      value: "0.0.0"
{{- end }}
{{- end }}
