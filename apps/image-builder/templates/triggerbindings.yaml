{{- if .Values.eventListener.enabled }}
{{- /*
TriggerBindings — map per-provider webhook payload fields to the shared
TriggerTemplate's `params:`. Each Trigger references its own binding.

The TriggerTemplate (templates/triggertemplate.yaml) expects:
  - git-url       (string)   SSH URL of the source repo
  - git-revision  (string)   commit SHA to build
  - image-name    (string)   image name (without registry/tag)
  - image-version (string)   semver base — taken from the repo's name or a
                              hard-coded "0.0.0" default; callers can override.

For all three providers, image-name defaults to the repository's short name.
For image-version we use "0.0.0" — semver bumps are typically tied to git
tags, which are out of scope for a push-triggered build. If you push a tag
instead, the github/bitbucket Interceptors will filter it out by default
(branchFilter regex).
*/ -}}
{{- if .Values.eventListener.triggers.github.enabled }}
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-binding
  namespace: {{ .Release.Namespace }}
spec:
  params:
    - name: git-url
      value: $(body.repository.ssh_url)
    - name: git-revision
      value: $(body.after)
    - name: image-name
      value: $(body.repository.name)
    - name: image-version
      value: "0.0.0"
{{- end }}
{{- if .Values.eventListener.triggers.bitbucket.enabled }}
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: bitbucket-binding
  namespace: {{ .Release.Namespace }}
spec:
  params:
    - name: git-url
      # Bitbucket exposes the SSH URL under repository.links.clone[?(@.name=='ssh')].href.
      # CEL extraction would be cleaner but TriggerBinding doesn't run CEL —
      # so we rely on the first push change's source for git-revision and
      # construct the SSH URL from the repository's full_name.
      value: "git@bitbucket.org:$(body.repository.full_name).git"
    - name: git-revision
      value: $(body.push.changes[0].new.target.hash)
    - name: image-name
      value: $(body.repository.name)
    - name: image-version
      value: "0.0.0"
{{- end }}
{{- if .Values.eventListener.triggers.azuredevops.enabled }}
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: azuredevops-binding
  namespace: {{ .Release.Namespace }}
spec:
  params:
    - name: git-url
      # Azure DevOps exposes sshUrl when SSH is enabled on the repo.
      value: $(body.resource.repository.sshUrl)
    - name: git-revision
      value: $(body.resource.refUpdates[0].newObjectId)
    - name: image-name
      value: $(body.resource.repository.name)
    - name: image-version
      value: "0.0.0"
{{- end }}
{{- end }}
