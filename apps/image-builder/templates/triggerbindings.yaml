{{- if .Values.eventListener.enabled }}
{{- /*
TriggerBindings â€” map per-provider webhook payload fields to the shared
TriggerTemplate's `params:`. Each Trigger references its own binding.

Provider-specific (clone URL + commit SHA come from different payload paths):
  - git-url       : HTTPS clone URL of the source repo
  - git-revision  : commit SHA to build

Provider-agnostic (CEL overlay in templates/triggers/<provider>.yaml computes
these into `extensions.*` before the binding evaluates):
  - image-name    : `X-Image-Name` HTTP header if set, else repo name
                    (monorepos use one webhook per component with a unique
                    header value to scope the build to a single image)
  - containerfile : `X-Containerfile` HTTP header if set, else "Containerfile"
                    at the repo root (single-Containerfile tenants don't
                    need any headers)
  - image-version : "0.0.0" hard-coded for now â€” semver bumps are driven
                    by the `deploy/image-version` file (Phase 2 feature)
*/ -}}
{{- if .Values.eventListener.triggers.github.enabled }}
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-binding
  namespace: {{ .Release.Namespace }}
spec:
  params:
    - name: git-url
      # GitHub's push payload has both `ssh_url` and `clone_url` â€” the
      # latter is the HTTPS form (https://github.com/<owner>/<repo>.git).
      value: $(body.repository.clone_url)
    - name: git-revision
      value: $(body.after)
    - name: image-name
      value: $(extensions.image-name)
    - name: image-version
      value: "0.0.0"
    - name: containerfile
      value: $(extensions.containerfile)
{{- end }}
{{- if .Values.eventListener.triggers.bitbucket.enabled }}
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: bitbucket-binding
  namespace: {{ .Release.Namespace }}
spec:
  params:
    - name: git-url
      # Bitbucket's payload exposes clone URLs under links.clone[] indexed
      # by name. TriggerBinding doesn't run CEL, so we compose the HTTPS
      # URL from the repository's full_name (works for bitbucket.org â€”
      # for self-hosted Bitbucket Server, override via webhook query
      # parameters at the Service Hook config side).
      value: "https://bitbucket.org/$(body.repository.full_name).git"
    - name: git-revision
      value: $(body.push.changes[0].new.target.hash)
    - name: image-name
      value: $(extensions.image-name)
    - name: image-version
      value: "0.0.0"
    - name: containerfile
      value: $(extensions.containerfile)
{{- end }}
{{- if .Values.eventListener.triggers.azuredevops.enabled }}
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: azuredevops-binding
  namespace: {{ .Release.Namespace }}
spec:
  params:
    - name: git-url
      # Azure DevOps's push event exposes both `sshUrl` and `remoteUrl`;
      # `remoteUrl` is the HTTPS clone URL (https://<org>@dev.azure.com/
      # <org>/<project>/_git/<repo>). Git's credential.helper=store
      # matches by URL prefix â€” `https://...@dev.azure.com` line in
      # `gitcredentials` injects the PAT on clone.
      value: $(body.resource.repository.remoteUrl)
    - name: git-revision
      value: $(body.resource.refUpdates[0].newObjectId)
    - name: image-name
      value: $(extensions.image-name)
    - name: image-version
      value: "0.0.0"
    - name: containerfile
      value: $(extensions.containerfile)
{{- end }}
{{- end }}
