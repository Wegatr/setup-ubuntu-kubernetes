apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.pipeline.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: image-builder
    app.kubernetes.io/component: pipeline-sa
---
# Separate SA for the EventListener pod — carries the Tekton Triggers
# ClusterRole bindings (incl. namespace Secret read for interceptor
# secretRef). Kept OFF pipeline-sa so PipelineRun pods can't read
# namespace Secrets via the API. See rbac.yaml for the full rationale.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.pipeline.eventListenerServiceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: image-builder
    app.kubernetes.io/component: eventlistener-sa
