# Shared values across DEV / TEST / PROD. Per-env Vault paths in
# values-{dev,test,prod}.yaml.

pipeline:
  # Zot OCI registry at apps/registry/. Composed at chart-render time from
  # the platform domain global so a single source of truth covers every env.
  # Phase A: only DEV builds (registry runs on DEV), but the literal still
  # works on TEST/PROD because they pull from the same DEV-hosted FQDN. The
  # buildah-build-push Task `tpl`s this value at render and runs
  # `buildah login` against it using REGISTRY_USERNAME / REGISTRY_PASSWORD
  # envFromSecret from the externalsecret-registry-push ExternalSecret.
  registry: 'zot.dev.{{ .Values.global.domain }}'
  # SA for PipelineRun pods — deliberately has NO API access to Secrets
  # (steps get them via envFrom / mounts only). Tenant pipelines run
  # under this SA as well.
  serviceAccountName: pipeline-sa
  # SA for the EventListener pod only — carries the Tekton Triggers
  # ClusterRole bindings (incl. namespace Secret read for webhook HMAC
  # interceptor secretRefs). Split from pipeline-sa so pipeline pods
  # can't read namespace Secrets through the API. See templates/rbac.yaml.
  eventListenerServiceAccountName: eventlistener-sa

# Workspace sizing. The `source` workspace holds the cloned source for the
# duration of one PipelineRun (PVC-backed; auto-cleaned by Tekton's pruner).
workspaces:
  sourceSize: 10Gi

# EventListener config — exposed publicly so GitHub / Bitbucket / Azure DevOps
# can call it on every push.
eventListener:
  enabled: true

  ingress:
    enabled: true
    # Composed at chart render time as <subdomain>.<env>.<domain>
    # (e.g. build.dev.<your-domain>) using platform globals + tpl.
    subdomain: build

  # Each provider has its own Trigger inside the same EventListener, with its
  # own Interceptor (HMAC verification with a provider-specific secret) and
  # TriggerBinding (payload → pipeline params).
  triggers:
    github:
      enabled: true
      # Branch regex applied by the github Interceptor's CEL filter. Only
      # pushes to matching branches spawn a PipelineRun.
      branchFilter: 'main|master'
    bitbucket:
      enabled: true
      branchFilter: 'main|master'
    azuredevops:
      enabled: true
      branchFilter: 'main|master'

# ExternalSecret #1 — HTTPS git credentials. The git-clone Task envFroms
# this Secret. The `gitcredentials` key holds a multi-line value, one
# `https://<user>:<pat>@<host>` record per Git provider the platform
# builds from. Git's credential-helper-store matches by URL prefix at
# clone time. To onboard a new provider, just append another line to the
# `gitcredentials` value in Vault — no chart change needed.
externalsecret-git-https:
  externalSecret:
    enabled: true
    name: image-builder-git-https
    namespace: image-builder
    targetSecretName: image-builder-git-https
    data:
      # Secret key MUST be `GITCREDENTIALS` (matches the env var the
      # git-clone step reads via envFrom secretRef → ${GITCREDENTIALS}).
      - secretKey: GITCREDENTIALS
        property: gitcredentials

# ExternalSecret #2 — Per-provider webhook signing secrets. One Kubernetes
# Secret with three keys; each Tekton Interceptor references one.
#   github:      HMAC-SHA256 secret matching GitHub's webhook UI "Secret" field
#                (Interceptor validates X-Hub-Signature-256).
#   bitbucket:   HMAC-SHA256 secret for Bitbucket webhook "Secret" field
#                (Interceptor validates X-Hub-Signature).
#   azuredevops: Bearer-style shared secret matching Azure DevOps's
#                X-Vss-Subscription-Auth header (Azure doesn't sign payloads;
#                the CEL Interceptor compares a constant header value).
externalsecret-webhooks:
  externalSecret:
    enabled: true
    name: image-builder-webhook-secrets
    namespace: image-builder
    targetSecretName: image-builder-webhook-secrets
    data:
      - secretKey: github
        property: github-webhook-secret
      - secretKey: bitbucket
        property: bitbucket-webhook-secret
      - secretKey: azuredevops
        property: azuredevops-webhook-secret

# ExternalSecret #3 — Zot push-user credentials. The buildah-build-push Task
# step's envFrom loads these two keys as REGISTRY_USERNAME + REGISTRY_PASSWORD
# (matching the Secret's secretKey names) and runs `buildah login` before
# bud / push. vaultPath supplied by values-{dev,test,prod}.yaml.
externalsecret-registry-push:
  externalSecret:
    enabled: true
    name: image-builder-registry-push
    namespace: image-builder
    targetSecretName: image-builder-registry-push
    data:
      - secretKey: REGISTRY_USERNAME
        property: push-user
      - secretKey: REGISTRY_PASSWORD
        property: push-password

# Monitoring chart — Pipeline alerting. The Tekton operator's own
# ServiceMonitor lives in apps/tekton/.
monitoring:
  prometheusRules:
    image-builder:
      enabled: true
      groups:
        - name: image-builder
          interval: 60s
          rules:
            - alert: PipelineRunFailed
              expr: increase(tekton_pipelines_controller_pipelinerun_count{status="failed"}[10m]) > 0
              for: 1m
              labels:
                severity: warning
              annotations:
                summary: "Image-builder PipelineRun failed in last 10 minutes"
                description: "Check `tkn pipelinerun list -n image-builder`."

            - alert: PipelineRunRunningTooLong
              expr: time() - max(tekton_pipelines_controller_running_pipelineruns_count > 0) > 1800
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Image-builder PipelineRun running > 30 minutes"
                description: "Check for stuck Buildah steps."

