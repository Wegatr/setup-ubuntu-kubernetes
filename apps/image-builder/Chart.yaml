apiVersion: v2
name: image-builder
version: 1.0.0
description: Tekton-based image build pipeline (git-clone → tag → buildah → trivy → gitleaks → summary) with multi-provider webhook triggers (GitHub, Bitbucket, Azure DevOps). Pushes to the GitOps-managed Zot registry at apps/registry/ (zot.dev.<DOMAIN_SUFFIX>). See README.md.
type: application

dependencies:
  # Pulls the HTTPS git-credentials store file from Vault into a Secret
  # whose `gitcredentials` key is envFrom'd by the git-clone Task step.
  # One Secret covers all providers (GitHub / Bitbucket / Azure DevOps) —
  # value is multi-line, one `https://<user>:<pat>@<host>` per provider.
  - name: external-secret
    version: 1.0.0
    repository: file://../../charts/external-secret
    alias: externalsecret-git-https

  # Pulls all per-provider webhook signing secrets from Vault into a single
  # Secret with keys github/bitbucket/azuredevops. Each Tekton Interceptor
  # references one key.
  - name: external-secret
    version: 1.0.0
    repository: file://../../charts/external-secret
    alias: externalsecret-webhooks

  # Pulls Zot push-user + push-password from Vault (secret/<env>/app/registry)
  # into a 2-key Secret. The buildah-build-push Task envFroms this Secret and
  # runs `buildah login` before bud/push — keeps the credentials out of
  # pipeline params + step args.
  - name: external-secret
    version: 1.0.0
    repository: file://../../charts/external-secret
    alias: externalsecret-registry-push

  # Per-namespace SecretStore (visible as an ArgoCD-managed resource).
  - name: secret-store
    version: 1.0.0
    repository: file://../../charts/secret-store

  # PrometheusRules + ServiceMonitor for the build pipeline.
  - name: monitoring
    version: 2.0.0
    repository: file://../../charts/monitoring
