# Redis is no-auth + cluster-internal (no Ingress). This NetworkPolicy isolates
# it: only the digita platform, the dbgate UI, and same-namespace pods (metrics
# exporter) may reach :6379. Any other (tenant) workload is denied. Calico-enforced.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-allow-internal
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: digita
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dbgate
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 6379
