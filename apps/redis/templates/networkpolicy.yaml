# Redis is no-auth + cluster-internal (no Ingress). This NetworkPolicy isolates
# it: only approved DB consumers may reach :6379 — platform namespaces by name
# (global.dbConsumerNamespaces), any namespace self-labelled
# global.dbConsumerLabel=true where that key is set (so external add-ons admit
# themselves without the platform hardcoding their namespace name), and
# same-namespace pods (metrics exporter). Any other workload is denied.
# Calico-enforced.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-allow-internal
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- range .Values.global.dbConsumerNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
        {{- with .Values.global.dbConsumerLabel }}
        - namespaceSelector:
            matchLabels:
              {{ . }}: "true"
        {{- end }}
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 6379
