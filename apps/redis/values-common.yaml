# Redis cache — official `redis` image on charts/deployment. Standalone, AOF,
# no auth (cluster-internal). Per-env storage / resources in values-{dev,test,prod}.
redis:
  image:
    repository: redis
    # Managed centrally in platform/versions.yaml (images.redis) and stamped by
    # tools/sync-versions — do not hand-edit this tag.
    tag: "8.8"
    pullPolicy: IfNotPresent
  replicas: 1
  containerPort: 6379
  # Single ReadWriteOnce data PVC → two pods must never coexist.
  strategy:
    type: Recreate
  terminationGracePeriodSeconds: 30
  # The official redis image runs as uid/gid 999 (the `redis` user).
  podSecurityContext:
    fsGroup: 999
  containerSecurityContext:
    runAsUser: 999
    runAsNonRoot: true
  # AOF durability (appendfsync everysec), data dir on the PVC.
  args:
    - redis-server
    - --appendonly
    - "yes"
    - --appendfsync
    - everysec
    - --dir
    - /data
  volumeMounts:
    - name: data
      mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: redis-data
  livenessProbe:
    exec:
      command: ["redis-cli", "ping"]
    initialDelaySeconds: 20
    periodSeconds: 15
    timeoutSeconds: 5
  readinessProbe:
    exec:
      command: ["redis-cli", "ping"]
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
  service:
    enabled: true
    type: ClusterIP
    port: 6379

# Data PVC. Prune=false,Delete=false so the cache survives chart removal.
redis-data:
  pvc:
    enabled: true
    name: redis-data
    accessModes:
      - ReadWriteOnce
    annotations:
      argocd.argoproj.io/sync-options: Prune=false,Delete=false
    # storageSize set per-env in values-{dev,test,prod}.yaml.

# Redis alert rules. Metrics (redis_*) come from the redis exporter, wired as a
# follow-up; until then these rules stay dormant.
monitoring:
  prometheusRules:
    redis:
      enabled: true
      groups:
        - name: redis
          interval: 60s
          rules:
            - alert: RedisDown
              expr: redis_up == 0
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "Redis instance {{ $labels.instance }} is down"

            - alert: RedisEvictionsSpiking
              expr: rate(redis_evicted_keys_total[5m]) > 10
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "Redis evicting keys at > 10/s"
