apiVersion: v2
name: redis
version: 1.0.0
description: Redis cache layer
dependencies:
  - name: redis
    version: 25.5.3
    # Bitnami trimmed their HTTPS index in Aug 2025 — older versions are
    # OCI-only now. Same rationale as apps/mongodb and apps/postgresql.
    repository: oci://registry-1.docker.io/bitnamicharts
  - name: prometheus-redis-exporter
    version: 6.5.0
    repository: https://prometheus-community.github.io/helm-charts
  - name: monitoring
    version: 2.0.0
    repository: file://../../charts/monitoring
