redis:
  master:
    # Dev environment storage
    persistence:
      size: 10Gi

    # Dev environment resources
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2
        memory: 6Gi

prometheus-redis-exporter:
  redisAddress: redis://redis-dev-headless.redis.svc.cluster.local:6379
