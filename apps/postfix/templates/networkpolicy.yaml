apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postfix-smtp-access
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mail
  policyTypes: [Ingress, Egress]
  ingress:
    # Namespaces allowed to talk to postfix on port 587 (no auth — restricted by
    # network policy only). Add your application namespaces below.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mongodb
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cronjobs
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vpn-monitoring
      ports:
        - protocol: TCP
          port: 587
  egress:
    - ports:
        - protocol: TCP
          port: 25
        - protocol: TCP
          port: 587
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
