apiVersion: v2
name: image-updater
version: 1.0.0
description: ArgoCD Image Updater — event-driven controller that auto-bumps Zot-built image tags in apps/<app>/values-<env>.yaml when notified by the image-builder Tekton pipeline. Sibling to apps/image-builder/. See README in setup-kubernetes/manifests/idp/ blueprints for the OIDC integration; this app stays untouched.
type: application

dependencies:
  # Upstream argocd-image-updater controller. Installs into its own
  # `image-updater` namespace (chart-default service-account + RBAC reach
  # ArgoCD Applications cluster-wide via ClusterRole).
  - name: argocd-image-updater
    version: 1.2.1
    repository: https://argoproj.github.io/argo-helm

  # Reuses the image-builder git PAT (multi-line credentials-store file
  # in Vault path <env>/app/image-builder, key gitcredentials). ESO
  # composes the dockerhub-extractable token + a default git username
  # into Secret argocd-image-updater-secret.
  - name: external-secret
    version: 1.0.0
    repository: file://../../charts/external-secret
    alias: externalsecret-git-credentials

  # Zot pull-user dockerconfigjson — referenced from registries.conf
  # so the controller can authenticate registry polls. Re-uses the
  # already-Vault-stored pull-dockerconfigjson under <env>/app/registry.
  - name: external-secret
    version: 1.0.0
    repository: file://../../charts/external-secret
    alias: externalsecret-zot-pull

  # Per-namespace SecretStore (vault-backend).
  - name: secret-store
    version: 1.0.0
    repository: file://../../charts/secret-store
