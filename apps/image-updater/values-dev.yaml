# DEV-specific Vault paths for the two ESO secrets + the literal Zot
# hostname (the upstream chart does not `tpl` registries config — see
# values-common.yaml comment).

argocd-image-updater:
  config:
    registries:
      - name: zot-dev
        api_url: https://zot.dev.digitaplatform.com
        prefix: zot.dev.digitaplatform.com
        credentials: pullsecret:image-updater/argocd-image-updater-zot-creds
        defaultns: zot.dev.digitaplatform.com

externalsecret-git-credentials:
  externalSecret:
    vaultPath: dev/app/image-builder

externalsecret-zot-pull:
  externalSecret:
    vaultPath: dev/app/registry
