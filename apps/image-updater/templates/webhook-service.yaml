# Cluster-internal Service for the webhook port exposed by the
# argocd-image-updater chart's Pod. The upstream chart's bundled Service
# only carries the metrics port; we add a sibling one for :8080/api/webhook
# so the Tekton image-builder task can POST to a stable DNS name without
# touching a public Ingress.
#
# Tekton calls:
#   http://argocd-image-updater-webhook.image-updater.svc.cluster.local:8080/api/webhook
apiVersion: v1
kind: Service
metadata:
  name: argocd-image-updater-webhook
  namespace: image-updater
  labels:
    app.kubernetes.io/name: argocd-image-updater-webhook
    app.kubernetes.io/part-of: argocd-image-updater
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: argocd-image-updater
  ports:
    - name: webhook
      port: 8080
      targetPort: 8080
      protocol: TCP
