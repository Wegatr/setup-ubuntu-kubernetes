# Allows cluster-internal pods to POST to the webhook port (8080) on the
# image-updater controller. The upstream chart ships a NetworkPolicy that
# selects the same pod but ONLY whitelists the metrics port (8443) — with
# `policyTypes: [Ingress]` that implicitly DENIES every other inbound port,
# including our webhook. This sibling policy adds 8080 back.
#
# Scope: any pod in the cluster can call /api/webhook. Acceptable because
# (a) the Service has no Ingress / public endpoint, and (b) Image Updater
# only acts on registries.conf-listed repos.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: argocd-image-updater-allow-webhook
  namespace: image-updater
  labels:
    app.kubernetes.io/name: argocd-image-updater-webhook
    app.kubernetes.io/part-of: argocd-image-updater
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-image-updater
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
