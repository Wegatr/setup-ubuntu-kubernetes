app:
  # All env vars — Helm array-replaces (no merge with values-common.yaml `env`).
  # DBGate reads CONNECTIONS=mongo,redis,postgres and materializes each connection
  # from per-connection LABEL_/SERVER_/PORT_/ENGINE_/USER_/PASSWORD_/URL_ vars.
  # Credentials come from Vault via the dbgate-db-credentials secret (see externalSecret below).
  env:
    # Disable DBGate's own login/JWT auth — Traefik's BasicAuth middleware
    # at the ingress layer handles all access control. Without this, DBGate
    # 7.x shows its own login page AND rejects the UI's API calls with
    # "jwt malformed" because there's no valid DBGate session token.
    - name: SKIP_ALL_AUTH
      value: "true"
    - name: CONNECTIONS
      value: "mongo,redis,app_postgres,idp_postgres"
    # --- MongoDB ---
    - name: LABEL_mongo
      value: "MongoDB (DEV)"
    - name: ENGINE_mongo
      value: "mongo@dbgate-plugin-mongo"
    - name: SERVER_mongo
      value: "mongodb-dev.mongodb.svc.cluster.local"
    - name: PORT_mongo
      value: "27017"
    # In-house mongodb-dev runs WITHOUT auth (cluster-internal, NetworkPolicy-
    # isolated) — no USER_mongo / PASSWORD_mongo. The single rs0 member
    # advertises this same FQDN, so the connection resolves cluster-wide.
    # --- Redis (no password: REDIS_AUTH_ENABLED=false in cluster config) ---
    - name: LABEL_redis
      value: "Redis (DEV)"
    - name: ENGINE_redis
      value: "redis@dbgate-plugin-redis"
    - name: URL_redis
      value: "redis://redis-dev.redis.svc.cluster.local:6379"
    # --- PostgreSQL (app — in-house chart) ---
    # The in-house postgresql chart at release name `postgresql-dev` creates a
    # ClusterIP Service named `postgresql-dev` in the postgresql namespace.
    # Connecting as the superuser; per-app users/databases are created at
    # runtime by the consuming application. Connection ID uses underscore
    # (POSIX env var); UI label uses hyphen for human readability.
    - name: LABEL_app_postgres
      value: "app-postgres (DEV)"
    - name: ENGINE_app_postgres
      value: "postgres@dbgate-plugin-postgres"
    - name: SERVER_app_postgres
      value: "postgresql-dev.postgresql.svc.cluster.local"
    - name: PORT_app_postgres
      value: "5432"
    - name: USER_app_postgres
      value: "postgres"
    - name: PASSWORD_app_postgres
      valueFrom:
        secretKeyRef:
          name: dbgate-db-credentials
          key: postgresql-password
    # --- PostgreSQL (idp — Authentik's bundled chart) ---
    # Authentik's bundled PostgreSQL StatefulSet — release `idp` in `idp`
    # namespace exposes a ClusterIP Service `idp-postgresql`. Connecting
    # as the `authentik` user (the only role with access to the `authentik`
    # database). Password sourced from Vault `<env>/system/idp` via a
    # separate ExternalSecret (see externalsecret-idp-db below).
    - name: LABEL_idp_postgres
      value: "idp-postgres (DEV)"
    - name: ENGINE_idp_postgres
      value: "postgres@dbgate-plugin-postgres"
    - name: SERVER_idp_postgres
      value: "idp-postgresql.idp.svc.cluster.local"
    - name: PORT_idp_postgres
      value: "5432"
    - name: USER_idp_postgres
      value: "authentik"
    - name: PASSWORD_idp_postgres
      valueFrom:
        secretKeyRef:
          name: dbgate-idp-db-credentials
          key: postgres-password
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Traefik BasicAuth middleware — reads htpasswd from `users` key of dbgate-credentials.
# Middleware name pinned to `basic-auth` (env-independent) via fullnameOverride.
# Referenced by the Ingress annotation: `dbgate-basic-auth@kubernetescrd`.
# Aliased as `basicauth` in Chart.yaml.
basicauth:
  fullnameOverride: basic-auth
  middleware:
    enabled: true
    type: basicAuth
    basicAuth:
      secretName: dbgate-credentials

# ExternalSecret #1 — Traefik BasicAuth credentials.
# Per-namespace SecretStore (visible as an ArgoCD-managed resource).
secret-store: {}

externalsecret-auth:
  externalSecret:
    enabled: true
    name: dbgate-credentials
    namespace: dbgate
    secretStoreKind: SecretStore
    targetSecretName: dbgate-credentials
    vaultPath: dev/app/dbgate
    data:
      - secretKey: users
        property: auth

# ExternalSecret #2 — DB password for the app-tier PostgreSQL (in-house chart)
# injected into the DBGate pod env. Mongo + Redis are no-auth (no secret).
externalsecret-db:
  externalSecret:
    enabled: true
    name: dbgate-db-credentials
    namespace: dbgate
    secretStoreKind: SecretStore
    targetSecretName: dbgate-db-credentials
    vaultPath: dev/app/dbgate
    data:
      - secretKey: postgresql-password
        property: postgresql-password

# ExternalSecret #3 — Authentik's bundled PostgreSQL password from the
# system-tier Vault path (Authentik = infrastructure, NOT a GitOps app,
# so its postgres password lives under secret/<env>/system/idp/, not
# secret/<env>/app/). The external-secrets Vault policy reads `secret/*`
# so this works without a role change.
externalsecret-idp-db:
  externalSecret:
    enabled: true
    name: dbgate-idp-db-credentials
    namespace: dbgate
    secretStoreKind: SecretStore
    targetSecretName: dbgate-idp-db-credentials
    vaultPath: dev/system/idp
    data:
      - secretKey: postgres-password
        property: postgres-password
