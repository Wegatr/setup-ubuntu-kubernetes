apiVersion: v2
name: dbgate
version: 1.0.0
description: DBGate — unified web UI for MongoDB and Redis (replaces mongoexpress/redisinsight)
type: application
appVersion: "7.1.11"
dependencies:
  - name: deployment
    version: 1.0.0
    repository: file://../../charts/deployment
    alias: app
  - name: ingress
    version: 1.0.0
    repository: file://../../charts/ingress
  - name: middleware
    version: 1.0.0
    repository: file://../../charts/middleware
    alias: basicauth
  - name: external-secret
    version: 1.0.0
    repository: file://../../charts/external-secret
    alias: externalsecret-auth
  - name: external-secret
    version: 1.0.0
    repository: file://../../charts/external-secret
    alias: externalsecret-db
  # Separate ExternalSecret for the IdP-bundled PostgreSQL — reads from
  # Vault path `<env>/system/idp` (not `app/dbgate`) because the IdP's
  # postgres password is part of the infrastructure-tier secrets seed.
  - name: external-secret
    version: 1.0.0
    repository: file://../../charts/external-secret
    alias: externalsecret-idp-db
  - name: pvc
    version: 1.0.0
    repository: file://../../charts/pvc
  - name: secret-store
    version: 1.0.0
    repository: file://../../charts/secret-store
  # Shared named templates (common.labels etc.) used by every library chart
  # above. Declared at APP level because Helm doesn't vendor nested file://
  # deps — see charts/common/Chart.yaml for the consumption rule.
  - name: common
    version: 1.0.0
    repository: file://../../charts/common
