apiVersion: v2
name: dbgate
version: 1.0.0
description: DBGate — unified web UI for MongoDB and Redis (replaces mongoexpress/redisinsight)
type: application
appVersion: "7.1.9"
dependencies:
  - name: deployment
    version: 1.0.0
    repository: file://../../charts/deployment
    alias: app
  - name: ingress
    version: 1.0.0
    repository: file://../../charts/ingress
  - name: middleware
    version: 1.0.0
    repository: file://../../charts/middleware
    alias: basicauth
  - name: external-secret
    version: 1.0.0
    repository: file://../../charts/external-secret
    alias: externalsecret-auth
  - name: external-secret
    version: 1.0.0
    repository: file://../../charts/external-secret
    alias: externalsecret-db
  - name: pvc
    version: 1.0.0
    repository: file://../../charts/pvc
  # Per-namespace ESO controller. Runs IN this app's namespace, with
  # Role/RoleBinding scoped to that namespace (no ClusterRole/CRB), watching
  # only the SecretStore + ExternalSecret CRs we render via secret-store/
  # external-secret library deps below. CRDs come from
  # apps/external-secrets-crds/ (cluster-wide, K8s constraint — CRDs cannot
  # be namespaced).
  - name: external-secrets
    alias: vault-connector
    version: 0.20.4
    repository: oci://ghcr.io/external-secrets/charts
  - name: secret-store
    version: 1.0.0
    repository: file://../../charts/secret-store
