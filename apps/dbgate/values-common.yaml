# DBGate — unified web UI for MongoDB, Redis, and PostgreSQL.
# Pod gets BasicAuth via Traefik middleware (public FQDN gate.<env>.<domain>).
# All connections are baked in via env vars → zero-click UX after login.
# All connection passwords are pulled from Vault via ExternalSecret (vault-backend SecretStore).
app:
  image:
    repository: dbgate/dbgate
    tag: "7.1.9"
    pullPolicy: IfNotPresent
  replicas: 1
  containerPort: 3000
  service:
    enabled: true
    type: ClusterIP
    port: 3000
  # DBGate data dir — persists saved queries / last-opened tabs across pod restarts.
  volumeMounts:
    - name: dbgate-data
      mountPath: /root/.dbgate
  volumes:
    - name: dbgate-data
      persistentVolumeClaim:
        claimName: dbgate-data
  # Probes — DBGate root path returns 200 when up.
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

pvc:
  pvc:
    enabled: true
    name: dbgate-data
    # storageClassName omitted — falls back to .Values.global.storageClass
    # (platform/values-common.yaml: microk8s-hostpath).
    accessModes:
      - ReadWriteOnce
    storageSize: "1Gi"

# Ingress — env-derived hostname, Service name, and TLS Secret name composed
# from .Values.global.env + .Values.global.domain via Helm `tpl`. The ingress
# chart's templates apply tpl to `host`, `paths[].serviceName`, and
# `tls.secretName` — see charts/ingress/templates/ingress.yaml.
# cert-manager.io/cluster-issuer is auto-applied from .Values.global.clusterIssuer.
ingress:
  ingress:
    enabled: true
    className: public
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: dbgate-basic-auth@kubernetescrd
    host: 'gate.{{ .Values.global.env }}.{{ .Values.global.domain }}'
    paths:
      - path: /
        pathType: Prefix
        serviceName: 'dbgate-{{ .Values.global.env }}-app'
        servicePort: 3000
    tls:
      enabled: true
      secretName: 'dbgate-{{ .Values.global.env }}-tls'

# ============================================================================
# Per-namespace ESO controller — runs IN namespace `dbgate`, watches only this
# namespace's ExternalSecret/SecretStore CRs. CRDs come from
# apps/external-secrets-crds/ (cluster-wide, K8s constraint). Everything
# below is inlined per-app so each Application is self-contained.
# ============================================================================
vault-connector:
  installCRDs: false            # CRDs are cluster-wide, owned by apps/external-secrets-crds/
  createOperator: true

  # SCOPING — the whole reason this controller is per-namespace:
  # scopedNamespace + scopedRBAC=true together cause the chart to render
  # Role/RoleBinding (not ClusterRole/CRB) and start the controller with
  # --namespace=dbgate. The pod cannot read or write Secrets outside this
  # namespace, even if its SA token were exfiltrated.
  scopedNamespace: dbgate
  scopedRBAC: true

  # Cluster-* reconcilers are off — they require ClusterRole privileges we
  # deliberately don't grant. Leaving them on causes "forbidden" reconcile
  # errors every tick.
  processClusterExternalSecret: false
  processClusterPushSecret: false
  processClusterStore: false
  processClusterGenerator: false

  # The chart's harmless servicebindings-aggregation ClusterRole is also
  # off — strict "no cluster-wide objects from this chart" compliance.
  rbac:
    servicebindings:
      create: false

  # No webhook → no cluster-wide ValidatingWebhookConfiguration, no webhook
  # pod, no cert-controller. CR validation happens at reconcile-time rather
  # than admission-time.
  webhook:
    create: false
  certController:
    create: false

  replicaCount: 1
  leaderElect: false        # single replica, no contention

  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # Expose /metrics so apps/observability/'s external-secrets ServiceMonitor
  # discovers this controller.
  metrics:
    service:
      enabled: true
  serviceMonitor:
    enabled: false           # the central monitor in observability owns this
