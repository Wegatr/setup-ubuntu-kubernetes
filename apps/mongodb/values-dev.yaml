mongodb-data:
  pvc:
    storageSize: "20Gi"

mongodb:
  # HA: 3-member replica set (multiple pods CAN coexist — each gets its own
  # volumeClaimTemplate PVC, unlike the old single-RWO Deployment).
  replicas: 3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

prometheus-mongodb-exporter:
  mongodb:
    uri: mongodb://mongodb-dev.mongodb.svc.cluster.local:27017/?directConnection=true
