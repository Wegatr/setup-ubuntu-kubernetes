mongodb-data:
  pvc:
    storageSize: "20Gi"

mongodb:
  # HA: a 3-member replica set survives a single member/node failure (real HA
  # needs a multi-node cluster). Dev runs replicas: 1 (restart-safe, single copy).
  replicas: 3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

prometheus-mongodb-exporter:
  mongodb:
    uri: mongodb://mongodb-prod.mongodb.svc.cluster.local:27017/?directConnection=true
