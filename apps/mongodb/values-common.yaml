# MongoDB — official `mongo` image on charts/deployment. Single-node replica set
# `rs0` (for transactions), NO auth. Access is restricted to digita + dbgate by
# the NetworkPolicy (templates/networkpolicy.yaml) instead of a root user — the
# DB is cluster-internal only (no Ingress), the NetworkPolicy isolates it from
# any other (tenant) workloads. Per-env storage / resources in values-{dev,test,prod}.
mongodb:
  image:
    repository: mongo
    # Managed centrally in platform/versions.yaml (images.mongodb) and stamped by
    # tools/sync-versions — do not hand-edit this tag.
    tag: "8.0.4"
    pullPolicy: IfNotPresent
  replicas: 1
  containerPort: 27017
  # Single ReadWriteOnce data PVC → two pods must never coexist.
  strategy:
    type: Recreate
  # The official mongo image runs as uid/gid 999 (the `mongodb` user).
  podSecurityContext:
    fsGroup: 999
  containerSecurityContext:
    runAsUser: 999
    runAsNonRoot: true
  # Replica set (single member) → transactions. No --auth ⇒ no keyFile needed.
  args:
    - --replSet
    - rs0
    - --bind_ip_all
  env:
    # The rs member must advertise the address clients use (the ClusterIP
    # service), so it resolves to the primary. env is tpl-rendered.
    - name: RS_HOST
      value: 'mongodb-{{ .Values.global.env }}.mongodb.svc.cluster.local:27017'
    - name: TZ
      value: '{{ .Values.global.timezone }}'
  # One-time, idempotent rs.initiate once mongod is up (mongod stays PID 1, so
  # SIGTERM still shuts it down cleanly). Re-run safe: skips if already a member.
  lifecycle:
    postStart:
      exec:
        command:
          - /bin/bash
          - -c
          - |
            until mongosh --quiet --eval 'db.adminCommand({ping:1})' >/dev/null 2>&1; do sleep 2; done
            mongosh --quiet --eval 'try { rs.status() } catch (e) { rs.initiate({_id:"rs0",members:[{_id:0,host:process.env.RS_HOST}]}) }'
  volumeMounts:
    - name: data
      mountPath: /data/db
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: mongodb-data
  livenessProbe:
    exec:
      command: ["mongosh", "--quiet", "--eval", "db.adminCommand({ping:1})"]
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 10
  readinessProbe:
    exec:
      command: ["mongosh", "--quiet", "--eval", "db.adminCommand({ping:1})"]
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 10
  service:
    enabled: true
    type: ClusterIP
    port: 27017

# Data PVC (/data/db). Prune=false,Delete=false survives chart removal.
mongodb-data:
  pvc:
    enabled: true
    name: mongodb-data
    accessModes:
      - ReadWriteOnce
    annotations:
      argocd.argoproj.io/sync-options: Prune=false,Delete=false
    # storageSize set per-env in values-{dev,test,prod}.yaml.

# MongoDB alert rules. Metrics (mongodb_*) come from the mongodb exporter, wired
# as a follow-up; until then these rules stay dormant.
monitoring:
  prometheusRules:
    mongodb:
      enabled: true
      groups:
        - name: mongodb
          interval: 60s
          rules:
            - alert: MongoDBDown
              expr: mongodb_up == 0
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "MongoDB instance {{ $labels.instance }} is down"

            - alert: MongoDBConnectionsSaturated
              expr: mongodb_ss_connections{conn_type="current"} / (mongodb_ss_connections{conn_type="current"} + mongodb_ss_connections{conn_type="available"}) > 0.8
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "MongoDB connection pool > 80% utilised"

# Metrics exporter — emits mongodb_* metrics (the alerts above need it). The
# connection URI is per-env (values-{dev,test,prod}); no auth (NetworkPolicy-
# isolated), so it carries no credentials.
prometheus-mongodb-exporter:
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: observability
  # Explicit collector list, omitting `profile` (panicked on older exporters).
  extraArgs:
    - --collector.diagnosticdata
    - --collector.replicasetstatus
    - --collector.dbstats
    - --collector.topmetrics
    - --collector.indexstats
    - --collector.collstats
    - --collector.currentopmetrics
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
