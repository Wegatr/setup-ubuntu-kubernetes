# MongoDB — the official `mongo` image on a StatefulSet (templates/): a replica
# set needs stable per-pod identity/DNS so each member self-identifies across
# restarts. Replica set `rs0` for multi-doc transactions, NO auth — the
# NetworkPolicy (templates/networkpolicy.yaml) restricts :27017 to digita +
# dbgate (DB is cluster-internal only, no Ingress). replicas: 1 here (dev:
# restart-safe, single copy); values-prod.yaml sets replicas: 3 for HA on a
# multi-node cluster. Per-env storage / resources / replicas in
# values-{dev,test,prod}.yaml.
mongodb:
  image:
    repository: mongo
    # Managed centrally in platform/versions.yaml (images.mongodb) and stamped by
    # tools/sync-versions — do not hand-edit this tag.
    tag: "8.0.4"
    pullPolicy: IfNotPresent
  replicas: 1
  containerPort: 27017
  # The official mongo image runs as uid/gid 999 (the `mongodb` user).
  podSecurityContext:
    fsGroup: 999
  containerSecurityContext:
    runAsUser: 999
    runAsNonRoot: true
  # Replica set → multi-doc transactions. No --auth ⇒ no keyFile needed.
  # TZ is set in templates/statefulset.yaml from global.timezone; rs0 is
  # configured by the PostSync Job (templates/rs-init-job.yaml).
  args:
    - --replSet
    - rs0
    - --bind_ip_all
  livenessProbe:
    exec:
      command: ["mongosh", "--quiet", "--eval", "db.adminCommand({ping:1})"]
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 10
  readinessProbe:
    exec:
      command: ["mongosh", "--quiet", "--eval", "db.adminCommand({ping:1})"]
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 10
# Per-pod data volume (volumeClaimTemplate → /data/db). Each member gets its own
# PVC (data-mongodb-<env>-<ordinal>), owned by the StatefulSet controller (not
# ArgoCD-pruned), so data survives a chart re-sync. storageSize per env below.
mongodb-data:
  pvc:
    accessModes:
      - ReadWriteOnce
    # storageSize set per-env in values-{dev,test,prod}.yaml.

# MongoDB alert rules. Metrics (mongodb_*) come from the mongodb exporter, wired
# as a follow-up; until then these rules stay dormant.
monitoring:
  prometheusRules:
    mongodb:
      enabled: true
      groups:
        - name: mongodb
          interval: 60s
          rules:
            - alert: MongoDBDown
              expr: mongodb_up == 0
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "MongoDB instance {{ $labels.instance }} is down"

            - alert: MongoDBConnectionsSaturated
              expr: mongodb_ss_connections{conn_type="current"} / (mongodb_ss_connections{conn_type="current"} + mongodb_ss_connections{conn_type="available"}) > 0.8
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "MongoDB connection pool > 80% utilised"

# Metrics exporter — emits mongodb_* metrics (the alerts above need it). The
# connection URI is per-env (values-{dev,test,prod}); no auth (NetworkPolicy-
# isolated), so it carries no credentials.
prometheus-mongodb-exporter:
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: observability
  # Explicit collector list, omitting `profile` (panicked on older exporters).
  extraArgs:
    - --collector.diagnosticdata
    - --collector.replicasetstatus
    - --collector.dbstats
    - --collector.topmetrics
    - --collector.indexstats
    - --collector.collstats
    - --collector.currentopmetrics
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
