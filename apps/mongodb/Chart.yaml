apiVersion: v2
name: mongodb
version: 1.0.0
description: |
  MongoDB — the OFFICIAL `mongo` image on a StatefulSet (no Bitnami, no operator,
  no charts/deployment). Replica set `rs0` for transactions, no auth; a
  NetworkPolicy (templates/networkpolicy.yaml) admits only approved DB consumers
  (platform namespaces by name + add-ons by the dbConsumerLabel) plus
  same-namespace pods — the DB is cluster-internal only (no Ingress).

  The image tag is managed centrally in platform/versions.yaml (images.mongodb)
  and stamped by tools/sync-versions. Per-pod data via volumeClaimTemplate;
  replicas per env (values-{dev,test,prod}.yaml).
type: application
dependencies:
  # The MongoDB workload (StatefulSet), its ClusterIP + headless Services, the
  # per-pod data volumeClaimTemplate and the rs-init Job are defined directly in
  # templates/ — a replica set needs stable per-pod identity, which charts/
  # deployment (a Deployment) cannot provide. See templates/statefulset.yaml.

  # MongoDB alert rules. Metrics come from the mongodb exporter (follow-up).
  - name: monitoring
    version: 2.0.0
    repository: file://../../charts/monitoring

  # Metrics exporter — emits mongodb_* metrics that the alert rules above watch.
  # No-auth connection (the DB is NetworkPolicy-isolated).
  - name: prometheus-mongodb-exporter
    version: 3.20.0
    repository: https://prometheus-community.github.io/helm-charts

  # Shared named templates used by the library charts above.
  - name: common
    version: 1.0.0
    repository: file://../../charts/common
