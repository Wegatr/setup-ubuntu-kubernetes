apiVersion: v2
name: mongodb
version: 1.0.0
description: MongoDB with transaction support (3-node replica set)
dependencies:
  - name: mongodb
    version: 18.4.4
    # Bitnami trimmed their HTTPS index in Aug 2025 — older versions are
    # OCI-only now. Pin to OCI so the dep resolves once 18.4.4 ages out
    # of the HTTPS index too.
    repository: oci://registry-1.docker.io/bitnamicharts
  - name: prometheus-mongodb-exporter
    version: 3.7.0
    repository: https://prometheus-community.github.io/helm-charts
  - name: secret-store
    version: 1.0.0
    repository: file://../../charts/secret-store
  - name: monitoring
    version: 2.0.0
    repository: file://../../charts/monitoring
