apiVersion: v1
kind: Service
metadata:
  # Headless companion Service for the single-member replica set. The rs0 member
  # advertises THIS Service's FQDN as its host (RS_HOST below). Because the
  # Service is headless (clusterIP: None) the FQDN resolves directly to the pod
  # IP — which mongod recognises as one of its own bound addresses, so the member
  # self-identifies reliably (the ClusterIP Service FQDN resolves to the virtual
  # IP, which mongod does NOT recognise as self, breaking the member across pod
  # restarts). The ClusterIP Service stays the client seed endpoint; clients
  # using ?replicaSet=rs0 are redirected here. publishNotReadyAddresses so the
  # FQDN resolves during startup before the readiness probe passes.
  name: mongodb-{{ .Values.global.env }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: replicaset-headless
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP
      name: mongodb
