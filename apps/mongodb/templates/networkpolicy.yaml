# MongoDB is no-auth + cluster-internal (no Ingress). This NetworkPolicy is the
# isolation that replaces the root user: only the digita platform, the dbgate UI,
# and same-namespace pods (metrics exporter, migration jobs) may reach :27017.
# Any other (tenant) workload in the cluster is denied. Enforced by Calico.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mongodb-allow-internal
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: digita
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dbgate
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 27017
