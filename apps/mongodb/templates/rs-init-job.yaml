{{- $host := printf "mongodb-%s-headless.mongodb.svc.cluster.local:27017" .Values.global.env -}}
apiVersion: batch/v1
kind: Job
metadata:
  # ArgoCD PostSync hook: ensure the single-member replica set rs0 is configured
  # with the headless Service FQDN as its member host, once the mongodb pod is
  # Ready. Self-healing + idempotent: initiates rs0 if absent, force-reconfigures
  # the member host if it drifted (e.g. an emergency reconfig to a pod IP), and
  # is a no-op if already correct. The headless FQDN resolves to the pod IP so
  # mongod self-identifies across restarts. Runs in this namespace so the mongodb
  # NetworkPolicy's same-namespace allow rule lets it reach :27017.
  name: mongodb-rs-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: rs-init
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 20
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/component: rs-init
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
      containers:
        - name: rs-init
          image: "{{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag }}"
          imagePullPolicy: {{ .Values.mongodb.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -uo pipefail
              URI="mongodb://{{ $host }}/?directConnection=true"
              echo "waiting for mongod at {{ $host }} ..."
              until mongosh "$URI" --quiet --eval 'db.adminCommand({ping:1})' >/dev/null 2>&1; do sleep 3; done
              echo "ensuring rs0 member host = {{ $host }} ..."
              mongosh "$URI" --quiet --eval '
                var target = "{{ $host }}";
                var isMember = false;
                try { rs.status(); isMember = true; } catch (e) {}
                if (!isMember) {
                  try { rs.initiate({_id: "rs0", members: [{_id: 0, host: target}]}); print("rs0 initiated -> " + target); }
                  catch (e) { var c = rs.conf(); c.members[0].host = target; rs.reconfig(c, {force: true}); print("rs0 force-reconfigured -> " + target); }
                } else {
                  var cur = rs.conf().members[0].host;
                  if (cur !== target) { var c = rs.conf(); c.members[0].host = target; rs.reconfig(c, {force: true}); print("rs0 host " + cur + " -> " + target); }
                  else { print("rs0 ok, host=" + cur); }
                }'
              echo "waiting for PRIMARY ..."
              until [ "$(mongosh "$URI" --quiet --eval 'try{rs.status().myState}catch(e){0}' 2>/dev/null)" = "1" ]; do sleep 2; done
              echo "rs0 PRIMARY (host {{ $host }}) — done."
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
