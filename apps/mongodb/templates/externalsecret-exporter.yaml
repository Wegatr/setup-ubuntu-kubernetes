{{- if .Values.exporterSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.exporterSecret.name }}
  namespace: {{ .Values.exporterSecret.namespace | default .Release.Namespace }}
spec:
  # No automatic refresh. ESO re-reconciles ONLY when:
  #   • this ExternalSecret CR is modified (chart re-deploy)
  #   • the target K8s Secret is manually deleted (recreated from Vault)
  #   • ESO controller restarts
  # Manual force: kubectl annotate externalsecret <name> force-sync="$(date +%s)" --overwrite
  refreshInterval: "0"
  secretStoreRef:
    name: {{ .Values.exporterSecret.secretStoreName | default .Values.global.secretStoreName }}
    kind: {{ .Values.exporterSecret.secretStoreKind | default "SecretStore" }}
  target:
    name: {{ .Values.exporterSecret.targetSecretName }}
    creationPolicy: Owner
    {{- with .Values.exporterSecret.template }}
    template:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  data:
  {{- range .Values.exporterSecret.data }}
  - secretKey: {{ .secretKey }}
    remoteRef:
      nullBytePolicy: Ignore
      key: {{ $.Values.exporterSecret.vaultPath }}
      property: {{ .property }}
  {{- end }}
{{- end }}
