# PostgreSQL — official `postgres` image on charts/deployment. Standalone
# primary: hosts legacy databases + serves as a DB-migration target. No Bitnami,
# no operator. Per-env storage size / resources / Vault path live in
# values-{dev,test,prod}.yaml.
postgres:
  image:
    repository: postgres
    # Managed centrally in platform/versions.yaml (images.postgres) and stamped
    # by tools/sync-versions — do not hand-edit this tag.
    tag: "18.4"
    pullPolicy: IfNotPresent
  replicas: 1
  containerPort: 5432
  # Single ReadWriteOnce data PVC → two pods must never coexist.
  strategy:
    type: Recreate
  # The official postgres image runs as uid/gid 999 (the `postgres` user).
  podSecurityContext:
    fsGroup: 999
  containerSecurityContext:
    runAsUser: 999
    runAsNonRoot: true
  env:
    # Superuser password from Vault (ESO → postgresql-credentials).
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: postgresql-credentials
          key: postgres-password
    # PGDATA in a sub-directory of the mount: the official image refuses to
    # initdb into a volume root that already contains lost+found.
    - name: PGDATA
      value: /var/lib/postgresql/data/pgdata
    # Timezone from the platform single-source-of-truth (env is tpl-rendered).
    - name: TZ
      value: '{{ .Values.global.timezone }}'
  volumeMounts:
    - name: data
      mountPath: /var/lib/postgresql/data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: postgres-data
  livenessProbe:
    exec:
      command: ["pg_isready", "-U", "postgres"]
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
  readinessProbe:
    exec:
      command: ["pg_isready", "-U", "postgres"]
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
  service:
    enabled: true
    type: ClusterIP
    port: 5432

# Data PVC. Prune=false,Delete=false so the database survives chart removal.
postgres-data:
  pvc:
    enabled: true
    name: postgres-data
    annotations:
      argocd.argoproj.io/sync-options: Prune=false,Delete=false
    accessModes:
      - ReadWriteOnce
    # storageSize set per-env in values-{dev,test,prod}.yaml.

# ============================================================================
# Vault-backed superuser credential. The official postgres image only needs
# POSTGRES_PASSWORD; the key below maps to Vault property `postgres-password`.
# Per-env vaultPath in values-{dev,test,prod}.yaml.
# ============================================================================
externalSecret:
  enabled: true
  name: postgresql-credentials
  namespace: postgresql
  secretStoreKind: SecretStore
  targetSecretName: postgresql-credentials
  data:
    - secretKey: postgres-password
      property: postgres-password

# ============================================================================
# PostgreSQL alert rules. Metrics (pg_*) come from the prometheus-postgres-
# exporter, wired as a follow-up; until then these rules stay dormant.
# ============================================================================
monitoring:
  prometheusRules:
    postgresql:
      enabled: true
      groups:
        - name: postgresql
          interval: 60s
          rules:
            - alert: PostgreSQLDown
              expr: pg_up == 0
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "PostgreSQL instance {{ $labels.instance }} is down"

            - alert: PostgreSQLConnectionsSaturated
              expr: sum by (instance) (pg_stat_activity_count) / on(instance) pg_settings_max_connections > 0.8
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "PostgreSQL connection pool > 80% utilised on {{ $labels.instance }}"
                description: "Active connections approaching max_connections. Reaching the limit will reject new clients."

            - alert: PostgreSQLDeadlocksSpiking
              expr: rate(pg_stat_database_deadlocks[5m]) > 0.1
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "PostgreSQL deadlocks > 0.1/s on {{ $labels.instance }}/{{ $labels.datname }}"

# Metrics exporter — emits pg_* metrics (the alerts above need it). The datasource
# host is per-env (values-{dev,test,prod}); the static parts are here. Connects as
# the postgres superuser using the password from the postgresql-credentials secret.
prometheus-postgres-exporter:
  config:
    datasource:
      user: postgres
      passwordSecret:
        name: postgresql-credentials
        key: postgres-password
      port: "5432"
      database: postgres
      sslmode: disable
  serviceMonitor:
    enabled: true
    labels:
      release: observability
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
