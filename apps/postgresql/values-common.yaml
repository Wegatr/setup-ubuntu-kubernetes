postgresql:
  # Architecture: standalone primary. PostgreSQL has transactions natively — no
  # replicaset gymnastics needed (contrast with mongodb in this platform, which
  # runs a 3-node replicaset purely for transaction support). Add a `readReplicas:`
  # block here if you ever need HA / read scaling.
  architecture: standalone

  # Authentication. Only the postgres superuser is provisioned. Consumers create
  # app-level users + databases at runtime, mirroring the mongodb convention.
  auth:
    existingSecret: postgresql-credentials
    # Maps which keys inside `postgresql-credentials` provide which password.
    # The default key names below are what the Bitnami chart expects when
    # existingSecret is set — keep them in sync with the ExternalSecret data.
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
      replicationPasswordKey: replication-password

  # Primary instance config
  primary:
    persistence:
      enabled: true
      accessModes:
        - ReadWriteOnce
    # Retain PVCs when StatefulSet is deleted or scaled down — same defensive
    # default as mongodb / redis. Prevents accidental data loss on chart removal.
    persistentVolumeClaimRetentionPolicy:
      enabled: true
      whenDeleted: Retain
      whenScaled: Retain
    podSecurityContext:
      enabled: true
      fsGroup: 1001
    containerSecurityContext:
      enabled: true
      runAsUser: 1001
      runAsNonRoot: true
    # Timezone — Bitnami's postgresql chart renders extraEnvVars through
    # `common.tplvalues.render` (Helm `tpl`), so this expression resolves at
    # chart-render time from platform/values-common.yaml.global.timezone.
    extraEnvVars:
      - name: TZ
        value: '{{ .Values.global.timezone }}'
    service:
      type: ClusterIP
      ports:
        postgresql: 5432

  # No read replicas in standalone mode — explicit to make this unambiguous.
  readReplicas:
    replicaCount: 0

  # --------------------------------------------------------------------------
  # Built-in postgres-exporter sidecar. Bitnami's chart runs it as a sidecar on
  # the primary pod, scraping `postgres://postgres@localhost:5432/`. No separate
  # exporterSecret block needed (cf. mongodb) — the exporter reuses the same
  # credentials Secret as the database via `existingSecret` above.
  # --------------------------------------------------------------------------
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      # Label the emitted ServiceMonitor so the central Prometheus discovers it
      # — same convention as prometheus-mongodb-exporter / prometheus-redis-exporter.
      labels:
        release: observability
      interval: 60s
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

# ============================================================================
# Vault-backed credentials. Per-env vaultPath overrides go in
# values-{dev,test,prod}.yaml.
#
# The Secret keys below must match `postgresql.auth.secretKeys` above:
#   - postgres-password     superuser password
#   - password              app-user password (created by chart if auth.username set)
#   - replication-password  used only if architecture moves to replication
# ============================================================================
externalSecret:
  enabled: true
  name: postgresql-credentials
  namespace: postgresql
  secretStoreKind: SecretStore
  targetSecretName: postgresql-credentials
  data:
    - secretKey: postgres-password
      property: postgres-password
    - secretKey: password
      property: password
    - secretKey: replication-password
      property: replication-password

# ============================================================================
# Monitoring chart — PostgreSQL alert rules. Sidecar exporter emits postgres_*
# metrics; rules below alert on the most-common production failure modes for a
# standalone primary.
# ============================================================================
monitoring:
  prometheusRules:
    postgresql:
      enabled: true
      groups:
        - name: postgresql
          interval: 60s
          rules:
            - alert: PostgreSQLDown
              expr: pg_up == 0
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "PostgreSQL instance {{ $labels.instance }} is down"

            - alert: PostgreSQLConnectionsSaturated
              expr: sum by (instance) (pg_stat_activity_count) / on(instance) pg_settings_max_connections > 0.8
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "PostgreSQL connection pool > 80% utilised on {{ $labels.instance }}"
                description: "Active connections approaching max_connections. Reaching the limit will reject new clients."

            - alert: PostgreSQLLongRunningTransactions
              expr: pg_stat_activity_max_tx_duration{state="active"} > 300
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "PostgreSQL has transactions running > 5 minutes on {{ $labels.instance }}"
                description: "Long-running transactions block vacuum and accumulate dead tuples. Investigate before they cause table bloat."

            - alert: PostgreSQLDeadlocksSpiking
              expr: rate(pg_stat_database_deadlocks[5m]) > 0.1
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: "PostgreSQL deadlocks > 0.1/s on {{ $labels.instance }}/{{ $labels.datname }}"

            - alert: PostgreSQLReplicationLag
              # Only fires if architecture is later moved to replication. Harmless
              # on a standalone primary (the metric is absent → expression empty).
              expr: pg_replication_lag_seconds > 30
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "PostgreSQL replica {{ $labels.instance }} lagging primary by > 30s"

