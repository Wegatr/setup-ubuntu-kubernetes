# Per-namespace SecretStore (visible as an ArgoCD-managed resource).
secret-store:

# External Secrets configuration — Vault path for TEST
externalSecret:
  vaultPath: test/app/postgresql

postgresql:
  primary:
    # Test environment storage
    persistence:
      size: 20Gi

    # Test environment resources
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 2Gi
