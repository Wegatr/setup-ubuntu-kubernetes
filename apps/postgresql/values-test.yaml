# Per-namespace SecretStore (visible as an ArgoCD-managed resource).
secret-store: {}

# Vault path for TEST.
externalSecret:
  vaultPath: test/app/postgresql

postgres-data:
  pvc:
    storageSize: "20Gi"

postgres:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
