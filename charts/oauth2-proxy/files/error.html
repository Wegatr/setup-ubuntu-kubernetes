{{define "error.html"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.StatusCode}} {{.Title}}</title>
<style>
  :root{
    --bg:#f8fafc;--card:#ffffff;--text:#0f172a;--muted:#64748b;
    --border:#e2e8f0;--primary:#2563eb;--primary-hover:#1d4ed8;
    --error:#dc2626;--rid:#94a3b8;
    --shadow:0 10px 25px rgba(15,23,42,.08);
  }
  body.dark{
    --bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;
    --border:#334155;--primary:#3b82f6;--primary-hover:#2563eb;
    --error:#ef4444;--rid:#64748b;
    --shadow:0 10px 25px rgba(0,0,0,.35);
  }
  *,*::before,*::after{box-sizing:border-box}
  body{
    margin:0;min-height:100vh;display:grid;place-items:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:var(--bg);color:var(--text);
    transition:background .15s,color .15s;
  }
  .toggle{
    position:fixed;top:1rem;right:1rem;width:2.25rem;height:2.25rem;
    background:var(--card);border:1px solid var(--border);border-radius:50%;
    cursor:pointer;display:grid;place-items:center;font-size:1rem;
    color:var(--text);transition:background .15s,border-color .15s;
  }
  .toggle:hover{border-color:var(--primary)}
  .toggle .sun{display:none}
  .toggle .moon{display:inline}
  body.dark .toggle .sun{display:inline}
  body.dark .toggle .moon{display:none}
  .card{
    width:min(420px,calc(100% - 2rem));padding:2rem;
    background:var(--card);border:1px solid var(--border);border-radius:12px;
    box-shadow:var(--shadow);text-align:center;
  }
  .code{
    font-size:3rem;font-weight:700;line-height:1;margin:0 0 .5rem;
    color:var(--error);letter-spacing:-.02em;
  }
  h1{margin:0 0 1rem;font-size:1.125rem;font-weight:600}
  p{margin:0 0 1.25rem;color:var(--muted);font-size:.875rem;line-height:1.5}
  a{
    display:inline-block;padding:.5rem 1rem;background:var(--primary);color:#fff;
    text-decoration:none;border-radius:6px;font-size:.875rem;font-weight:500;
    transition:background .15s;
  }
  a:hover{background:var(--primary-hover)}
  .rid{margin-top:1rem;font-size:.75rem;color:var(--rid);font-family:ui-monospace,monospace}
</style>
</head>
<body>
  <button class="toggle" type="button" id="theme-toggle" aria-label="Toggle dark mode">
    <span class="moon" aria-hidden="true">🌙</span><span class="sun" aria-hidden="true">☀️</span>
  </button>
  <main class="card">
    <p class="code">{{.StatusCode}}</p>
    <h1>{{.Title}}</h1>
    <p>{{.Message}}</p>
    {{ if eq .StatusCode 403 }}
    <a href="{{.ProxyPrefix}}/sign_in">Sign in</a>
    {{ end }}
    {{ if .RequestID }}<div class="rid">id: {{.RequestID}}</div>{{ end }}
  </main>
<script>
  (function(){
    var KEY="oauth2-proxy-theme";
    var btn=document.getElementById("theme-toggle");
    function set(t){
      if(t==="dark"){document.body.classList.add("dark");}
      else{document.body.classList.remove("dark");}
      try{localStorage.setItem(KEY,t);}catch(e){}
    }
    var saved=null;
    try{saved=localStorage.getItem(KEY);}catch(e){}
    if(saved){set(saved);}
    btn.addEventListener("click",function(){
      set(document.body.classList.contains("dark")?"light":"dark");
    });
  })();
</script>
</body>
</html>
{{end}}
