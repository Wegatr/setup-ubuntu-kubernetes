{{define "sign_in.html"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>Sign in</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{
    margin:0;min-height:100vh;display:grid;place-items:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:#0f172a;color:#e2e8f0;
  }
  .card{
    width:min(360px,calc(100% - 2rem));padding:2rem 2rem 1.75rem;
    background:#1e293b;border:1px solid #334155;border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.35);
  }
  h1{margin:0 0 1.5rem;font-size:1.125rem;font-weight:600;text-align:center;letter-spacing:.02em}
  .field{display:block;margin-bottom:1rem;font-size:.875rem}
  .field span{display:block;margin-bottom:.375rem;color:#94a3b8}
  input[type=text],input[type=password]{
    width:100%;padding:.625rem .75rem;background:#0f172a;border:1px solid #334155;
    border-radius:6px;color:#e2e8f0;font-size:.875rem;outline:none;
    transition:border-color .15s,box-shadow .15s;
  }
  input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
  button{
    width:100%;padding:.625rem;margin-top:.5rem;background:#2563eb;color:#fff;
    border:none;border-radius:6px;font-size:.875rem;font-weight:600;cursor:pointer;
    transition:background .15s;
  }
  button:hover{background:#1d4ed8}
  button:active{background:#1e40af}
  .message{
    margin:0 0 1rem;padding:.625rem .75rem;border-radius:6px;font-size:.8125rem;
    background:#1e293b;border:1px solid #334155;color:#cbd5e1;
  }
  @media (prefers-color-scheme: light){
    body{background:#f8fafc;color:#0f172a}
    .card{background:#fff;border-color:#e2e8f0;box-shadow:0 10px 25px rgba(15,23,42,.08)}
    .field span{color:#64748b}
    input[type=text],input[type=password]{background:#f8fafc;border-color:#cbd5e1;color:#0f172a}
    .message{background:#f1f5f9;border-color:#e2e8f0;color:#334155}
  }
</style>
</head>
<body>
  <form method="POST" action="{{.ProxyPrefix}}/sign_in?rd={{.Redirect}}" class="card">
    <h1>Sign in</h1>
    {{ if .SignInMessage }}<p class="message">{{.SignInMessage}}</p>{{ end }}
    <input type="hidden" name="rd" value="{{.Redirect}}">
    <label class="field">
      <span>Username</span>
      <input type="text" name="username" autofocus autocomplete="username" autocapitalize="off" spellcheck="false">
    </label>
    <label class="field">
      <span>Password</span>
      <input type="password" name="password" autocomplete="current-password">
    </label>
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
{{end}}
