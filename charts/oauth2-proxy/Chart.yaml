apiVersion: v2
name: oauth2-proxy
version: 1.0.0
description: |
  oauth2-proxy as a reverse-proxy in front of an upstream Service, with
  cookie-based session auth and htpasswd-file backend (no external OIDC).

  Use case: gating SPA dashboards (Tekton Dashboard, ArgoCD UI, Headlamp,
  dbgate, …) where Traefik's basic-auth Middleware is unsuitable because:
    • basic-auth's Authorization header does not propagate on WebSocket
      upgrades — modern SPAs use WS for live data → repeated 401 prompts
    • basic-auth credentials are cached per (origin, realm), and any sub-
      resource that issues its own challenge re-prompts the browser
  oauth2-proxy serves an HTML login form (no native browser dialog),
  validates against htpasswd, then issues a signed cookie. The cookie
  travels with every subsequent request including WebSocket handshakes.

  Architecture (single-pod reverse-proxy, NOT Traefik forwardAuth):
    Browser  →  Traefik Ingress  →  oauth2-proxy Service:4180
                                       │
                                       │ (cookie valid? proxy to upstream)
                                       │ (cookie missing? show login form)
                                       ▼
                                    upstream Service
  Consumer chart provides:
    - upstream URL (cluster-internal, e.g. http://dashboard.ns.svc:9097)
    - hostname (public FQDN — used for cookie domain + redirect URL)
    - authSecretName (K8s Secret with `htpasswd` + `cookie-secret` keys)
  The Secret is typically materialized by an ExternalSecret reading
  htpasswd + cookie-secret keys from Vault.
type: application
