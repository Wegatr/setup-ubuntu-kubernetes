{{- /*
Per-namespace ESO setup. ESO's namespaced SecretStore can only reference a
ServiceAccount in its OWN namespace (unlike ClusterSecretStore which can
cross namespaces). So this chart creates both:

  1. A local ServiceAccount that Vault's `external-secrets` role accepts.
     Vault's bound_service_account_namespaces list must include this
     release's namespace — managed in setup-gitops/setup-gitops.sh.
  2. A SecretStore referencing the local SA.

The SA gets a token automatically (Kubernetes 1.22+ TokenRequest API);
ESO presents that token to Vault during the kubernetes auth login.
*/ -}}
{{- if .Values.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    vault:
      {{- /*
      Vault URL: explicit secret-store.vaultUrl wins; otherwise falls back to
      .Values.global.vaultUrl (platform/values-{env}.yaml).
      */}}
      server: {{ required "vaultUrl must be set: either secret-store.vaultUrl in the app's values, or global.vaultUrl in platform/values-{env}.yaml" (.Values.vaultUrl | default .Values.global.vaultUrl) | quote }}
      path: {{ .Values.kvPath | quote }}
      version: {{ .Values.kvVersion | quote }}
      namespace: {{ .Values.vaultNamespace | quote }}
      {{- with .Values.caBundle }}
      caBundle: {{ . | quote }}
      {{- end }}
      auth:
        kubernetes:
          mountPath: {{ .Values.kubernetesAuthPath | quote }}
          role: {{ .Values.role | quote }}
          serviceAccountRef:
            # Local SA — namespaced SecretStore cannot cross namespaces.
            name: {{ .Values.serviceAccountName | quote }}
{{- end }}
