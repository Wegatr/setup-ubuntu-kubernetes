{{- if .Values.acrSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ required "acrSecret.name is required" .Values.acrSecret.name }}
  namespace: {{ .Values.acrSecret.namespace | default .Release.Namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: {{ .Values.acrSecret.secretStoreName }}
    kind: {{ .Values.acrSecret.secretStoreKind }}
  target:
    name: {{ .Values.acrSecret.targetSecretName | default .Values.acrSecret.name }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ "{{ .dockerconfigjson }}" }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        # Emit EVERY defaulted remoteRef field explicitly (same rule as
        # charts/external-secret) — omitting any of them makes the API
        # server fill it in on write and ArgoCD then shows a permanent
        # OutOfSync on this ExternalSecret.
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: {{ required "acrSecret.vaultPath is required" .Values.acrSecret.vaultPath }}
        property: {{ .Values.acrSecret.property }}
{{- end }}
