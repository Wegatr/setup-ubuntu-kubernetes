{{- if .Values.rbac.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "rbac.fullname" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
---
{{- if .Values.rbac.clusterWide }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "rbac.fullname" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "rbac.fullname" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "rbac.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "rbac.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "rbac.fullname" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "rbac.fullname" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "rbac.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "rbac.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
