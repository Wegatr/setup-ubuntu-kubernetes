apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "common.fullname" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: 2
  replicas: {{ .Values.replicas }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "common.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccountName }}
      serviceAccountName: {{ .Values.serviceAccountName }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "common.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- /*
          Optional container lifecycle hooks (e.g. a postStart that runs
          rs.initiate() for a single-node MongoDB replica set). Only rendered
          when set, so existing consumers are unaffected.
          */}}
          {{- with .Values.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- /*
          Compose env vars: optional envSources lists are concatenated first
          (e.g. shared ConfigMap-derived envs from multiple deployments), then
          .Values.env from the consumer. The previous block also tried to merge
          .Values.global.env, but that key collides with the platform-wide
          `global.env: dev|test|prod` string. Removed — use envSources instead
          if shared env injection is needed in the future.
          */}}
          {{- $allEnv := list }}
          {{- range .Values.envSources }}
          {{- $allEnv = concat $allEnv . }}
          {{- end }}
          {{- if .Values.env }}
          {{- $allEnv = concat $allEnv .Values.env }}
          {{- end }}
          {{- if $allEnv }}
          {{- /*
          Apply Helm `tpl` to the env YAML so values can reference
          .Values.global.env / .Values.global.domain — used by dbgate's
          SERVER_postgres / SERVER_mongo / URL_redis env vars to compose
          cluster-internal FQDNs from a single source of truth.
          */}}
          env:
            {{- tpl (toYaml $allEnv) $ | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
