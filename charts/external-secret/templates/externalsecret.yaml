{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecret.name | default (include "common.fullname" .) }}
  namespace: {{ .Values.externalSecret.namespace | default .Release.Namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  # No automatic refresh. ESO re-reconciles ONLY when:
  #   • this ExternalSecret CR is modified (chart re-deploy)
  #   • the target K8s Secret is manually deleted (recreated from Vault)
  #   • ESO controller restarts
  # Manual force: kubectl annotate externalsecret <name> force-sync="$(date +%s)" --overwrite
  refreshInterval: "0"
  secretStoreRef:
    # Defaults to .Values.global.secretStoreName (platform/values-common.yaml).
    # Set externalSecret.secretStoreName explicitly only to override.
    name: {{ .Values.externalSecret.secretStoreName | default .Values.global.secretStoreName }}
    kind: {{ .Values.externalSecret.secretStoreKind | default "SecretStore" }}
  target:
    name: {{ .Values.externalSecret.targetSecretName | default (include "common.fullname" .) }}
    creationPolicy: Owner
    {{- with .Values.externalSecret.template }}
    # Optional: assemble derived secret keys (e.g. connection URIs) from pulled
    # properties via ESO templating. Values use ESO's own {{ `{{ .secretKey }}` }}
    # syntax, NOT Helm's — set engineVersion: v2 to enable.
    template:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  data:
  {{- range .Values.externalSecret.data }}
  - secretKey: {{ .secretKey }}
    remoteRef:
      # Emit EVERY defaulted remoteRef field explicitly — including
      # `nullBytePolicy` — so ArgoCD doesn't see them as server-side drift.
      # The vendored ESO 2.4.x CRDs (apps/external-secrets/templates/)
      # declare all four fields with these defaults; omitting any of them
      # makes the API server fill it in on write and ArgoCD then shows a
      # permanent OutOfSync. When bumping ESO, keep this list in sync with
      # the vendored CRD schema.
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      nullBytePolicy: Ignore
      key: {{ .vaultPath | default $.Values.externalSecret.vaultPath | required (printf "externalSecret.vaultPath is required (data entry %q has no per-entry vaultPath and no chart-level default)" .secretKey) }}
      property: {{ .property }}
  {{- end }}
{{- end }}
