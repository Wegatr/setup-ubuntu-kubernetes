{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecret.name | default (include "external-secret.fullname" .) }}
  namespace: {{ .Values.externalSecret.namespace | default .Release.Namespace }}
  labels:
    {{- include "external-secret.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    # Defaults to .Values.global.secretStoreName (platform/values-common.yaml).
    # Set externalSecret.secretStoreName explicitly only to override.
    name: {{ .Values.externalSecret.secretStoreName | default .Values.global.secretStoreName }}
    kind: {{ .Values.externalSecret.secretStoreKind | default "SecretStore" }}
  target:
    name: {{ .Values.externalSecret.targetSecretName | default (include "external-secret.fullname" .) }}
    creationPolicy: Owner
    {{- with .Values.externalSecret.template }}
    # Optional: assemble derived secret keys (e.g. connection URIs) from pulled
    # properties via ESO templating. Values use ESO's own {{ `{{ .secretKey }}` }}
    # syntax, NOT Helm's — set engineVersion: v2 to enable.
    template:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  data:
  {{- range .Values.externalSecret.data }}
  - secretKey: {{ .secretKey }}
    remoteRef:
      # Explicit defaults so ArgoCD doesn't see them as server-side drift.
      #
      # NOTE: `nullBytePolicy` is deliberately NOT emitted here. ESO v0.20.4's
      # CRD schema (which we vendor in apps/external-secrets/templates/) does
      # not declare this field, so the API server's pruning would strip it on
      # write and ArgoCD would surface a permanent drift on every
      # ExternalSecret. If a future ESO version adds the field back, re-add
      # the line here AND in the vendored CRD at the same time.
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      nullBytePolicy: Ignore
      key: {{ .vaultPath | default $.Values.externalSecret.vaultPath }}
      property: {{ .property }}
  {{- end }}
{{- end }}
