{{- if .Values.middleware.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "common.fullname" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  {{- if eq .Values.middleware.type "basicAuth" }}
  basicAuth:
    secret: {{ .Values.middleware.basicAuth.secretName }}
  {{- else if eq .Values.middleware.type "stripPrefix" }}
  stripPrefix:
    prefixes:
      {{- toYaml .Values.middleware.stripPrefix.prefixes | nindent 6 }}
  {{- else if eq .Values.middleware.type "redirectScheme" }}
  redirectScheme:
    scheme: {{ .Values.middleware.redirectScheme.scheme | default "https" }}
    permanent: {{ .Values.middleware.redirectScheme.permanent | default true }}
  {{- else if eq .Values.middleware.type "redirectRegex" }}
  redirectRegex:
    # `tpl` so regex/replacement can reference .Values.global.{env,domain}
    # — apps/registry composes the bare-host → OIDC-login redirect from
    # one source of truth via Helm. No-op for non-templated strings.
    regex: {{ tpl .Values.middleware.redirectRegex.regex . | quote }}
    replacement: {{ tpl .Values.middleware.redirectRegex.replacement . | quote }}
    permanent: {{ .Values.middleware.redirectRegex.permanent | default true }}
  {{- else if eq .Values.middleware.type "forwardAuth" }}
  forwardAuth:
    {{- /*
    address is tpl'd so the consumer can compose the URL from platform
    globals (e.g. cluster-internal Service DNS includes the release name
    that varies per env: login-dev vs login-test vs login-prod).
    */}}
    address: {{ tpl .Values.middleware.forwardAuth.address . | quote }}
    trustForwardHeader: {{ .Values.middleware.forwardAuth.trustForwardHeader | default true }}
    {{- with .Values.middleware.forwardAuth.authResponseHeaders }}
    authResponseHeaders:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
{{- end }}
