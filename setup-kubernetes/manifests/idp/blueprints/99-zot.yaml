# yaml-language-server: $schema=
# Authentik blueprint — OAuth2 provider + Application for the Zot OCI
# registry's bundled web UI. Zot v2.x supports OpenID Connect alongside
# htpasswd auth — browser users log in via Authentik, CLI/programmatic
# clients (image-builder buildah push, workload pull) keep using
# htpasswd (push-user / pull-user / admin) unchanged.
#
# Redirect URI follows Zot's convention `<external-url>/auth/callback/
# <provider-name>`. Zot v2 only accepts a fixed allowlist of provider
# names (github / google / gitlab / dex / oidc), so we use the generic
# "oidc" key; the human-facing "name" field stays "Authentik" for the
# UI label. Without "oidc" as the key Zot exits with
# `unsupported openid/oauth2 provider` on startup.
version: 1
metadata:
  name: Zot OIDC client
  labels:
    blueprints.goauthentik.io/instantiate: "true"
conditions:
  - !Find [authentik_providers_oauth2.scopemapping, [scope_name, groups]]
entries:
  - id: zot-provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: Zot
    attrs:
      name: Zot
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      client_type: confidential
      client_id: zot
      client_secret: ${IDP_ZOT_CLIENT_SECRET}
      redirect_uris:
        - matching_mode: strict
          url: https://zot.${IDP_ENV}.${IDP_DOMAIN}/auth/callback/oidc
      access_token_validity: hours=1
      refresh_token_validity: days=30
      sub_mode: hashed_user_id
      include_claims_in_id_token: true
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, groups]]
  - id: zot-app
    model: authentik_core.application
    identifiers:
      slug: zot
    attrs:
      name: Zot
      slug: zot
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Zot]]
      meta_launch_url: https://zot.${IDP_ENV}.${IDP_DOMAIN}/
      open_in_new_tab: true
      group: Platform
