# Traefik forwardAuth Middleware → Authentik's embedded Outpost.
# Consumer Ingresses (apps/tekton, apps/dbgate, apps/seq) reference this
# cross-namespace as `idp-forwardauth@kubernetescrd`. Traefik is patched
# (configure_traefik_addon in lib/install-microk8s.sh) to allow cross-
# namespace middleware refs.
#
# Authentik's `/outpost.goauthentik.io/auth/traefik` endpoint speaks the
# Traefik forwardAuth protocol natively — returns 2xx with X-authentik-*
# headers when the apex session cookie is valid, or 302 to the Authentik
# sign-in flow when not.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: forwardauth
  namespace: idp
spec:
  forwardAuth:
    address: http://idp-authentik-server.idp.svc.cluster.local:80/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
