# ArgoCD Helm Values

# Global Configuration
global:
  domain: __ARGOCD_HOST__

# Server Configuration
server:
  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: public
    annotations:
      cert-manager.io/cluster-issuer: __CLUSTER_ISSUER__
      # Outer SSO gate via apps/login (oauth2-proxy + Traefik forwardAuth).
      # Cross-namespace Middleware ref: <namespace>-<name>@kubernetescrd.
      # When apps/login isn't yet synced, Traefik fail-opens — bootstrap
      # works on a fresh cluster. Once login-dev is Ready, this gate kicks
      # in and unauth users get 302'd to login.<env>.<domain>.
      # ArgoCD STILL prompts for its own admin login after the gate
      # (dual-auth, Phase 1). Phase 2 would wire ArgoCD's OIDC config to
      # accept oauth2-proxy headers and skip its internal login.
      traefik.ingress.kubernetes.io/router.middlewares: login-forwardauth@kubernetescrd
    hosts:
      - __ARGOCD_HOST__
    tls:
      - secretName: argocd-server-tls
        hosts:
          - __ARGOCD_HOST__

  # Disable default TLS since we're using ingress
  extraArgs:
    - --insecure

# Controller Configuration
controller:
  replicas: 1

# Repo Server Configuration
repoServer:
  replicas: 1

# Redis Configuration
redis:
  enabled: true

# Configs
configs:
  params:
    server.insecure: true
  cm:
    url: https://__ARGOCD_HOST__
    # Custom health check for Ingress on bare-metal (MicroK8s)
    # Default check requires status.loadBalancer.ingress which is never
    # populated without a cloud LoadBalancer. Mark Ingress as Healthy
    # once it has rules assigned by the controller.
    resource.customizations.health.networking.k8s.io_Ingress: |
      hs = {}
      hs.status = "Healthy"
      hs.message = ""
      return hs
