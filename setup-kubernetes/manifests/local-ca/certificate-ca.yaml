apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: local-ca
  secretName: local-ca-tls
  duration: 87600h
  renewBefore: 2160h
  subject:
    organizations:
      - master.local
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrapper
    kind: ClusterIssuer
    group: cert-manager.io
