# Kubernetes Dashboard (Headlamp) Helm Values

# Service Configuration
service:
  type: ClusterIP  # Use ClusterIP, ingress will handle external access
  externalPort: 443

# Metrics Scraper
metricsScraper:
  enabled: true

# RBAC Settings
rbac:
  create: true
  clusterReadOnlyRole: true

# Service Account
serviceAccount:
  create: true
  name: kubernetes-dashboard

# Resources
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Settings
settings:
  # Global dashboard settings
  clusterName: "__CLUSTER_NAME__"
  itemsPerPage: 10
  labelsLimit: 3
  logsAutoRefreshTimeInterval: 5
  resourceAutoRefreshTimeInterval: 5
  disableAccessDeniedNotifications: false

# OIDC — Headlamp chart 0.42+ uses an `envFrom: secretRef` pattern when
# externalSecret.enabled=true. The referenced Secret must hold keys NAMED
# AS THE ENV VARS Headlamp expects: OIDC_CLIENT_ID, OIDC_CLIENT_SECRET,
# OIDC_ISSUER_URL, OIDC_SCOPES (NOT camelCase clientID/etc.). The Secret
# `headlamp-oidc` in this namespace is pre-created by deploy_idp.
# `hasScopes: true` makes the chart pass `-oidc-scopes=$(OIDC_SCOPES)` flag.
# `secret.create: false` disables the chart's own bundled Secret (which
# would only contain scopes literal and double-render).
config:
  oidc:
    secret:
      create: false
    externalSecret:
      enabled: true
      name: headlamp-oidc
      hasScopes: true
