apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vault
  namespace: vault
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`__VAULT_HOST__`)
      kind: Rule
      services:
        - name: vault
          port: 8200
          serversTransport: vault-transport
  tls:
    secretName: vault-tls
# Auth: handled by Vault's OWN OIDC auth method (enabled post-init by
# `enable_vault_oidc` in lib/deploy-vault.sh). The HTTP API itself uses
# token auth — IngressRoute is purely the transport layer.
