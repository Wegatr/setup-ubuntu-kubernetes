apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vault
  namespace: vault
spec:
  entryPoints:
    - websecure
  routes:
    # Bare-path route → tiny nginx that serves a JS auto-redirect to
    # Authentik (see auto-redirect.yaml). Higher priority because it's
    # more specific than the catch-all rule below.
    - match: Host(`__VAULT_HOST__`) && Path(`/`)
      kind: Rule
      priority: 100
      services:
        - name: vault-auto-redirect
          port: 80
    # Everything else (/ui/..., /v1/..., static assets, callback) goes
    # straight to Vault — including the POST to /v1/auth/oidc/oidc/auth_url
    # that the redirect page fires.
    - match: Host(`__VAULT_HOST__`)
      kind: Rule
      services:
        - name: vault
          port: 8200
          serversTransport: vault-transport
  tls:
    secretName: vault-tls
# Auth: Vault's OWN OIDC auth method (enabled post-init by enable_vault_oidc
# in lib/deploy-vault.sh) handles the browser SSO. The HTTP API still uses
# token auth — IngressRoute is purely the transport + the bare-path
# auto-redirect to a one-click SSO flow.
