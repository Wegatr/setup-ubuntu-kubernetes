# Cluster-internal Service for Image Updater's webhook server.
# The argocd-image-updater chart only exposes the metrics port by default;
# we add a separate Service for the webhook so the Tekton image-builder
# task can POST to a stable DNS name
# (argocd-image-updater-webhook.argocd.svc.cluster.local) without
# punching out to the public Ingress.
#
# No Ingress / IngressRoute on top: the webhook is consumed exclusively
# in-cluster (Tekton runs in the `image-builder` namespace, same cluster).
# Keeping it ClusterIP-only removes a public attack surface and removes
# the need for a cert + DNS record.
apiVersion: v1
kind: Service
metadata:
  name: argocd-image-updater-webhook
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater-webhook
    app.kubernetes.io/part-of: argocd-image-updater
spec:
  type: ClusterIP
  selector:
    # Match the controller pod the helm chart creates.
    app.kubernetes.io/name: argocd-image-updater
  ports:
    - name: webhook
      port: 8080
      targetPort: 8080
      protocol: TCP
