# Per-namespace External-Secrets-Operator controllers for the DEV cluster.
#
# WHY a separate ApplicationSet
#   The existing platform-apps-dev AppSet templates  path: "apps/{{ .name }}"
#   — one chart-folder per app. ESO is different: ONE chart (apps/external-
#   secrets/) gets instantiated N times, once per app-namespace. Each
#   instance pins its own scopedNamespace via helm.valuesObject.
#
# WHY sync wave 1
#   apps/external-secrets-crds/ (wave 0) registers the ExternalSecret /
#   SecretStore / … CRDs with the API server. ESO controllers must come
#   AFTER the CRDs but BEFORE any workload Application that creates those
#   CRs (waves 10+). Wave 1 sits cleanly in that gap.
#
# WHY the elements list duplicates workload apps' namespaces
#   For each app-namespace that uses charts/secret-store/ (i.e. has any
#   ExternalSecret CR), there must be a scoped ESO controller in the SAME
#   namespace to reconcile that CR. The seven namespaces below match the
#   distinct workload apps with ExternalSecrets in DEV.
#
# WHY no separate templatePatch
#   No per-instance conditional logic (no ServerSideApply, no
#   ignoreDifferences). Every generated Application is identical except
#   for the namespace.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-eso-dev
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error

  generators:
    - list:
        elements:
          - ns: mongodb
          - ns: postgresql
          - ns: postfix
          - ns: seq
          - ns: dbgate
          - ns: observability
          - ns: image-builder

  template:
    metadata:
      name: "external-secrets-{{ .ns }}-dev"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "1"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        # `&repo` / `&branch` anchors mirror the platform-apps-dev AppSet.
        - repoURL: &repo "https://github.com/kartalbas/setup-ubuntu-kubernetes.git"
          targetRevision: &branch main
          ref: values
        - repoURL: *repo
          targetRevision: *branch
          path: apps/external-secrets
          helm:
            valueFiles:
              - $values/platform/values-common.yaml
              - $values/platform/values-dev.yaml
              - values-common.yaml
              - values-dev.yaml
            # Per-instance override — scopes this ESO to one namespace.
            # `valuesObject` is merged last by ArgoCD, so it wins over any
            # value-file content.
            valuesObject:
              external-secrets:
                scopedNamespace: "{{ .ns }}"
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "{{ .ns }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
