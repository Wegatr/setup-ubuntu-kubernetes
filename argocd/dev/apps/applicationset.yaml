# ApplicationSet — generates one ArgoCD Application per app for the DEV cluster.
# Replaces the per-app Application files that used to live in this directory.
# RepoURL and targetRevision live HERE (one place), no longer duplicated 8×.
#
# Bootstrap: argocd/dev/root-app.yaml syncs this directory; ArgoCD creates the
# ApplicationSet; the applicationset-controller materializes the 8 Applications.
#
# To add a new app: append an entry to `generators[0].list.elements` below.
# To change the repo / branch globally for this env: edit the two literals in
# the `sources:` template once. All 8 generated Applications follow.
#
# Per-app conditional fields (syncPolicy.syncOptions extras, ignoreDifferences)
# live in `templatePatch:` further down. That field is a YAML string, so the
# linter doesn't try to parse the Go template directives inside it.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-apps-dev
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error

  generators:
    - list:
        elements:
          # Wave 1 — External-Secrets-Operator (controller + the 2 CRDs we
          # actually use). One Application per cluster — dev/test/prod each
          # run on their own cluster. Sync wave 1 so it lands before
          # workload apps at wave 10+ that create SecretStore /
          # ExternalSecret CRs. Visible in ArgoCD next to the workload apps.
          #
          # specialOptions=external-secrets activates ServerSideApply=true in
          # templatePatch below — the bundled SecretStore CRD's OpenAPI
          # schema is ~580 KB which exceeds the 262 KB
          # last-applied-configuration annotation limit on client-side apply.
          - name: external-secrets
            project: core
            syncWave: "1"
            namespace: external-secrets
            prune: "true"
            createNamespace: "true"
            specialOptions: "external-secrets"

          # NOTE: The platform Identity Provider (Authentik) is INFRASTRUCTURE-
          # tier, not GitOps. It lives at setup-kubernetes/manifests/idp/ and
          # is installed by the bootstrap script before ArgoCD reconciles this
          # ApplicationSet — see setup-kubernetes/lib/deploy-idp.sh. Reason:
          # ArgoCD itself authenticates via the IdP, so it can't be managed BY
          # ArgoCD (chicken-and-egg). No `login`/`idp` entry here.

          # Wave 3 — Tekton operator + CRDs. Must exist before image-builder
          # (wave 25) creates Pipelines / Tasks / EventListeners.
          - name: tekton
            project: cicd
            syncWave: "3"
            namespace: tekton
            prune: "true"
            createNamespace: "true"
            specialOptions: ""

          # Wave 5 — DNS must resolve before any ESO/SecretStore tries Vault.
          - name: coredns
            project: core
            syncWave: "5"
            namespace: kube-system
            prune: "false"
            createNamespace: "false"
            specialOptions: ""

          # Wave 7 — Zot OCI registry. DEV-ONLY entry — this is the single
          # cluster-wide private image registry. TEST and PROD do NOT
          # generate this Application (their applicationset.yaml has no
          # registry entry) and pull from https://zot.dev.<DOMAIN_SUFFIX>/
          # over the public internet via the same pull-dockerconfigjson
          # seeded into their own Vaults. Must be Ready before any wave-10+
          # workload that pulls a private image.
          - name: registry
            project: cicd
            syncWave: "7"
            namespace: registry
            prune: "true"
            createNamespace: "true"
            specialOptions: ""

          # Wave 10 — Core data stores. Independent peers.
          - name: mongodb
            project: data
            syncWave: "10"
            namespace: mongodb
            prune: "true"
            createNamespace: "true"
            specialOptions: ""

          - name: postgresql
            project: data
            syncWave: "10"
            namespace: postgresql
            prune: "true"
            createNamespace: "true"
            specialOptions: ""

          # Wave 20 — Adjacent platform services.
          - name: postfix
            project: services
            syncWave: "20"
            namespace: postfix
            prune: "true"
            createNamespace: "true"
            specialOptions: ""

          - name: redis
            project: data
            syncWave: "20"
            namespace: redis
            prune: "true"
            createNamespace: "true"
            specialOptions: ""

          - name: seq
            project: services
            syncWave: "20"
            namespace: seq
            prune: "true"
            createNamespace: "true"
            specialOptions: ""

          # Wave 25 — image-build pipeline. Runs after wave-20 services
          # (postfix / redis / seq) so the build pipeline has email +
          # logging available; before wave-30 UIs that may consume newly-
          # built images.
          - name: image-builder
            project: cicd
            syncWave: "25"
            namespace: image-builder
            prune: "true"
            createNamespace: "true"
            specialOptions: ""

          # Wave 30 — UIs + observability stack.
          - name: dbgate
            project: services
            syncWave: "30"
            namespace: dbgate
            prune: "true"
            createNamespace: "true"
            specialOptions: ""

          # observability triggers extra patch (ignoreDifferences + ServerSideApply)
          # in templatePatch below.
          - name: observability
            project: observability
            syncWave: "30"
            namespace: observability
            prune: "true"
            createNamespace: "true"
            specialOptions: "observability"

  template:
    metadata:
      name: "{{ .name }}-dev"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{ .syncWave }}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: "{{ .project }}"
      sources:
        # Values-only source: makes `$values/...` resolvable inside the chart
        # source's helm.valueFiles list below. The `&repo` / `&branch` YAML
        # anchors let the chart source below reuse the same literal — one
        # source of truth per env, no duplication.
        - repoURL: &repo "https://github.com/kartalbas/setup-ubuntu-kubernetes.git"
          targetRevision: &branch main
          ref: values
        # Chart source — references the anchors above.
        - repoURL: *repo
          targetRevision: *branch
          path: "apps/{{ .name }}"
          helm:
            valueFiles:
              - $values/platform/values-common.yaml
              - $values/platform/values-dev.yaml
              - values-common.yaml
              - values-dev.yaml
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "{{ .namespace }}"

  # All per-app conditional logic lives here, inside a YAML block scalar (|).
  # The linter doesn't parse Go template directives inside string values, so
  # this stays free of "Implicit map key" / "Block collection in flow"
  # warnings. ArgoCD's applicationset-controller renders this and strategic-
  # merges the result onto the template above.
  templatePatch: |
    spec:
      syncPolicy:
        automated:
          prune: {{ .prune }}
          selfHeal: true
        syncOptions:
          - CreateNamespace={{ .createNamespace }}
          {{- if eq .specialOptions "observability" }}
          - ServerSideApply=true
          {{- end }}
          {{- if eq .specialOptions "external-secrets" }}
          - ServerSideApply=true
          {{- end }}
      {{- if eq .specialOptions "observability" }}
      ignoreDifferences:
        - group: apps
          kind: StatefulSet
          jsonPointers:
            - /spec/volumeClaimTemplates
        - group: apps
          kind: Deployment
          jqPathExpressions:
            - '.spec.template.spec.containers[]?.env[]?.valueFrom.resourceFieldRef.divisor'
      {{- end }}
