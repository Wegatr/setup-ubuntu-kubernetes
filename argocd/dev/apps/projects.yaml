# ArgoCD AppProjects for the DEV cluster.
#
# Why projects (not just `default`): the stock `default` project allows `*`
# repos, `*` destinations and `*` cluster-scoped resources — i.e. no blast
# radius at all. These projects pin each app group to:
#   • the one source repo
#   • exactly the namespaces it deploys to (destinations)
#   • only the cluster-scoped resource kinds it legitimately creates
#     (data / services create NONE → clusterResourceWhitelist: [])
#
# Lifecycle: this file lives in argocd/dev/apps/ next to applicationset.yaml,
# so root-app.yaml's directory sync applies it. The sync-wave -1 annotation
# guarantees the AppProjects exist before the ApplicationSet's generated
# Applications (which reference them by name) attempt their first sync.
#
# The generated Applications pick their project via the `project:` field added
# to each element in applicationset.yaml. The root-app itself stays in
# `default` on purpose: it CREATES these projects, so it can't depend on one
# existing first (chicken-and-egg).
#
# DEV has 5 projects. TEST/PROD have 4 — they don't run the build plane
# (tekton / registry / image-builder), so they have no `cicd` project.
#
# Cluster-resource whitelists below were derived from the ACTUAL rendered
# manifests, not assumptions:
#   • external-secrets: vendored CRDs (apps/external-secrets/templates/) +
#     the operator's ClusterRole/Binding. Webhook + cert-controller disabled.
#   • observability: kube-prometheus-stack CRDs + ClusterRole/Binding +
#     prometheus-operator admission webhooks.
#   • cicd/tekton: the vendored release-*.yaml create Namespace objects
#     (tekton, tekton-resolvers), CRDs, ClusterRole/Binding and Validating/
#     Mutating webhooks — confirmed by grep over apps/tekton/templates/.
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: core
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Cluster foundation — External-Secrets operator + CoreDNS. Privileged (CRDs, kube-system).
  sourceRepos:
    - https://github.com/kartalbas/setup-ubuntu-kubernetes.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: external-secrets
    - server: https://kubernetes.default.svc
      namespace: kube-system
  clusterResourceWhitelist:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: data
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Stateful data stores — MongoDB, PostgreSQL, Redis. Namespaced only; never creates cluster-scoped resources.
  sourceRepos:
    - https://github.com/kartalbas/setup-ubuntu-kubernetes.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: mongodb
    - server: https://kubernetes.default.svc
      namespace: postgresql
    - server: https://kubernetes.default.svc
      namespace: redis
  # Empty = no cluster-scoped resources permitted. These charts create only
  # namespaced objects (StatefulSet, PVC, Service, SA, Secret, ServiceMonitor,
  # PrometheusRule). A chart change that tried to add a ClusterRole would be
  # blocked at sync time.
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: services
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Supporting platform services — Postfix, Seq, DBGate. Namespaced only.
  sourceRepos:
    - https://github.com/kartalbas/setup-ubuntu-kubernetes.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: postfix
    - server: https://kubernetes.default.svc
      namespace: seq
    - server: https://kubernetes.default.svc
      namespace: dbgate
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Monitoring plane — kube-prometheus-stack, Loki, Tempo, Alloy, Grafana. Cluster-wide scraper.
  sourceRepos:
    - https://github.com/kartalbas/setup-ubuntu-kubernetes.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: observability
  clusterResourceWhitelist:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cicd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Build plane (DEV-only) — Tekton, Zot registry, image-builder. Privileged (Tekton CRDs, buildah).
  sourceRepos:
    - https://github.com/kartalbas/setup-ubuntu-kubernetes.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: tekton
    # Tekton's vendored release-pipelines.yaml also deploys the remote
    # resolvers into their own namespace (release-pipelines.yaml:26102+).
    - server: https://kubernetes.default.svc
      namespace: tekton-resolvers
    - server: https://kubernetes.default.svc
      namespace: registry
    - server: https://kubernetes.default.svc
      namespace: image-builder
  clusterResourceWhitelist:
    # Tekton's release manifests create the Namespace objects themselves
    # (release-pipelines.yaml:16 + :26038, release-dashboard.yaml:23).
    - group: ""
      kind: Namespace
    # Tekton Triggers ships its core interceptors as cluster-scoped CRs
    # (release-interceptors.yaml:163+ — github/gitlab/bitbucket/cel/slack).
    - group: triggers.tekton.dev
      kind: ClusterInterceptor
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
