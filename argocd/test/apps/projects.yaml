# ArgoCD AppProjects for the TEST cluster. See argocd/dev/apps/projects.yaml
# for the full rationale. TEST runs no build plane, so there is no `cicd`
# project here — only core / data / services / observability.
#
# Applied by root-app.yaml's directory sync (this file sits next to
# applicationset.yaml). sync-wave -1 makes the projects exist before the
# generated Applications reference them. The root-app stays in `default`.
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: core
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Cluster foundation — External-Secrets operator + CoreDNS. Privileged (CRDs, kube-system).
  sourceRepos:
    - https://github.com/kartalbas/setup-ubuntu-kubernetes.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: external-secrets
    - server: https://kubernetes.default.svc
      namespace: kube-system
  clusterResourceWhitelist:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: data
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Stateful data stores — MongoDB, PostgreSQL, Redis. Namespaced only; never creates cluster-scoped resources.
  sourceRepos:
    - https://github.com/kartalbas/setup-ubuntu-kubernetes.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: mongodb
    - server: https://kubernetes.default.svc
      namespace: postgresql
    - server: https://kubernetes.default.svc
      namespace: redis
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: services
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Supporting platform services — Postfix, Seq, DBGate. Namespaced only.
  sourceRepos:
    - https://github.com/kartalbas/setup-ubuntu-kubernetes.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: postfix
    - server: https://kubernetes.default.svc
      namespace: seq
    - server: https://kubernetes.default.svc
      namespace: dbgate
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Monitoring plane — kube-prometheus-stack, Loki, Tempo, Alloy, Grafana. Cluster-wide scraper.
  sourceRepos:
    - https://github.com/kartalbas/setup-ubuntu-kubernetes.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: observability
  clusterResourceWhitelist:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
