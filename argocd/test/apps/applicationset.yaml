# ApplicationSet — generates one ArgoCD Application per app for the TEST cluster.
# Replaces the per-app Application files that used to live in this directory.
# RepoURL and targetRevision live HERE (one place), no longer duplicated 8×.
#
# Bootstrap: argocd/test/root-app.yaml syncs this directory; ArgoCD creates the
# ApplicationSet; the applicationset-controller materializes the 8 Applications.
#
# To add a new app: append an entry to `generators[0].list.elements` below.
# To change the repo / branch globally for this env: edit the two literals in
# the `sources:` template once. All 8 generated Applications follow.
#
# Per-app conditional fields (syncPolicy.syncOptions extras, ignoreDifferences)
# live in `templatePatch:` further down. That field is a YAML string, so the
# linter doesn't try to parse the Go template directives inside it.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-apps-test
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error

  generators:
    - list:
        elements:
          # Wave 1 — ESO controller + the 2 CRDs we use (ExternalSecret +
          # SecretStore). One Application per cluster. specialOptions=
          # external-secrets activates ServerSideApply=true in templatePatch
          # below — the bundled SecretStore CRD's OpenAPI schema exceeds
          # the 262 KB last-applied-configuration annotation limit.
          - name: external-secrets
            project: core
            syncWave: "1"
            namespace: external-secrets
            prune: "true"
            createNamespace: "true"
            specialOptions: "external-secrets"

          - name: coredns
            project: core
            syncWave: "5"
            namespace: kube-system
            prune: "false"
            createNamespace: "false"
            specialOptions: ""

          - name: mongodb
            project: data
            syncWave: "10"
            namespace: mongodb
            prune: "true"
            createNamespace: "true"
            specialOptions: ""

          - name: postgresql
            project: data
            syncWave: "10"
            namespace: postgresql
            prune: "true"
            createNamespace: "true"
            specialOptions: ""

          - name: postfix
            project: services
            syncWave: "20"
            namespace: postfix
            prune: "true"
            createNamespace: "true"
            specialOptions: ""

          - name: redis
            project: data
            syncWave: "20"
            namespace: redis
            prune: "true"
            createNamespace: "true"
            specialOptions: ""

          - name: seq
            project: services
            syncWave: "20"
            namespace: seq
            prune: "true"
            createNamespace: "true"
            specialOptions: ""

          - name: dbgate
            project: services
            syncWave: "30"
            namespace: dbgate
            prune: "true"
            createNamespace: "true"
            specialOptions: ""

          - name: observability
            project: observability
            syncWave: "30"
            namespace: observability
            prune: "true"
            createNamespace: "true"
            specialOptions: "observability"

  template:
    metadata:
      name: "{{ .name }}-test"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{ .syncWave }}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: "{{ .project }}"
      sources:
        # `&repo` / `&branch` anchors are reused by the second source below —
        # the repo URL literal appears once per ApplicationSet.
        - repoURL: &repo "https://github.com/kartalbas/setup-ubuntu-kubernetes.git"
          targetRevision: &branch main
          ref: values
        - repoURL: *repo
          targetRevision: *branch
          path: "apps/{{ .name }}"
          helm:
            valueFiles:
              - $values/platform/values-common.yaml
              - $values/platform/values-test.yaml
              - values-common.yaml
              - values-test.yaml
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "{{ .namespace }}"

  templatePatch: |
    spec:
      syncPolicy:
        automated:
          prune: {{ .prune }}
          selfHeal: true
        syncOptions:
          - CreateNamespace={{ .createNamespace }}
          {{- if eq .specialOptions "observability" }}
          - ServerSideApply=true
          {{- end }}
          {{- if eq .specialOptions "external-secrets" }}
          - ServerSideApply=true
          {{- end }}
      {{- if eq .specialOptions "observability" }}
      ignoreDifferences:
        - group: apps
          kind: StatefulSet
          jsonPointers:
            - /spec/volumeClaimTemplates
        - group: apps
          kind: Deployment
          jqPathExpressions:
            - '.spec.template.spec.containers[]?.env[]?.valueFrom.resourceFieldRef.divisor'
      {{- end }}
