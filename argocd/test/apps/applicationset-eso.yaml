# Per-namespace External-Secrets-Operator controllers for the TEST cluster.
# See argocd/dev/apps/applicationset-eso.yaml for the full rationale; this
# is the TEST counterpart with the same shape but a different env-suffix
# and a slightly smaller elements list (image-builder is dev-only in
# Phase A).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-eso-test
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error

  generators:
    - list:
        elements:
          - ns: mongodb
          - ns: postgresql
          - ns: postfix
          - ns: seq
          - ns: dbgate
          - ns: observability

  template:
    metadata:
      name: "external-secrets-{{ .ns }}-test"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "1"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: &repo "https://github.com/kartalbas/setup-ubuntu-kubernetes.git"
          targetRevision: &branch main
          ref: values
        - repoURL: *repo
          targetRevision: *branch
          path: apps/external-secrets
          helm:
            valueFiles:
              - $values/platform/values-common.yaml
              - $values/platform/values-test.yaml
              - values-common.yaml
              - values-test.yaml
            valuesObject:
              external-secrets:
                scopedNamespace: "{{ .ns }}"
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "{{ .ns }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
