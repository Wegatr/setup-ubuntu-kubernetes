apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault
  namespace: vault
  annotations:
    cert-manager.io/cluster-issuer: __CLUSTER_ISSUER__
    # Vault's listener is TLS-enabled (tls_disable = 0), so the backend speaks
    # HTTPS. The pod cert is self-signed-by-Let's-Encrypt for the public host,
    # not for the in-cluster Service name, so skip backend SSL verification.
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
spec:
  ingressClassName: public
  tls:
  - hosts:
    - __VAULT_HOST__
    secretName: vault-tls
  rules:
  - host: __VAULT_HOST__
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vault
            port:
              number: 8200
